<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONE Store - لوحة الأدمن</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --primary:#6366f1;--primary-light:#818cf8;
            --bg:#0a0a0a;--bg-card:#1a1a2e;--bg-card-hover:#252540;
            --text:#ffffff;--text-secondary:#a1a1aa;
            --border:rgba(255,255,255,0.1);--danger:#ef4444;
            --success:#10b981;--warning:#f59e0b;
            --radius-lg:20px;--radius-md:14px;--radius-sm:10px;
            --shadow:0 4px 24px rgba(0,0,0,0.4);--transition:all 0.3s ease;
        }
        body.light-mode{
            --bg:#f8fafc;--bg-card:#ffffff;--bg-card-hover:#f1f5f9;
            --text:#0f172a;--text-secondary:#64748b;
            --border:rgba(0,0,0,0.08);--shadow:0 4px 24px rgba(0,0,0,0.06);
        }
        body{
            font-family:'Cairo',-apple-system,sans-serif;
            background:var(--bg);color:var(--text);
            min-height:100vh;transition:var(--transition);
            padding-bottom:100px;
        }
        body::before{
            content:'';position:fixed;top:-50%;left:-50%;
            width:200%;height:200%;
            background:radial-gradient(ellipse at 30% 20%,rgba(99,102,241,0.1) 0%,transparent 50%),
                       radial-gradient(ellipse at 70% 60%,rgba(245,158,11,0.05) 0%,transparent 50%);
            pointer-events:none;z-index:0;transition:var(--transition);
        }
        .app{position:relative;z-index:1;max-width:550px;margin:0 auto;padding:12px}
        .header{
            display:flex;align-items:center;justify-content:space-between;
            padding:14px 8px;margin-bottom:16px;
            position:sticky;top:0;z-index:100;
            background:rgba(10,10,10,0.9);backdrop-filter:blur(20px);
            border-radius:0 0 var(--radius-lg) var(--radius-lg);
        }
        body.light-mode .header{background:rgba(255,255,255,0.9)}
        .header h2{font-size:20px;font-weight:800}
        .header-actions{display:flex;gap:6px}
        .icon-btn{
            width:40px;height:40px;border-radius:50%;border:none;
            background:var(--bg-card);color:var(--text);font-size:18px;
            cursor:pointer;display:flex;align-items:center;justify-content:center;
            transition:var(--transition);
        }
        .icon-btn:hover{background:var(--bg-card-hover)}
        .section{margin-bottom:14px}
        .section-title{
            font-size:15px;font-weight:800;margin:18px 0 10px;
            display:flex;align-items:center;gap:8px;color:var(--primary-light);
        }
        .section-title::after{
            content:'';flex:1;height:2px;
            background:linear-gradient(to left,var(--primary),transparent);border-radius:2px;
        }
        .card{
            background:var(--bg-card);border-radius:var(--radius-md);
            padding:16px;margin-bottom:8px;border:1px solid var(--border);
            transition:var(--transition);
        }
        .card:hover{border-color:var(--primary-light)}
        .input-group{margin-bottom:12px}
        .input-group label{display:block;font-size:12px;color:var(--text-secondary);margin-bottom:5px;font-weight:600}
        .input-group input,.input-group textarea,.input-group select{
            width:100%;padding:11px 14px;border-radius:var(--radius-sm);
            border:1px solid var(--border);background:var(--bg);
            color:var(--text);font-family:inherit;font-size:13px;
            transition:var(--transition);resize:vertical;
        }
        .input-group input:focus,.input-group textarea:focus,.input-group select:focus{
            outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,0.15);
        }
        .input-group textarea{min-height:70px}
        .input-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .btn{
            width:100%;padding:12px;border-radius:var(--radius-sm);
            border:none;font-family:inherit;font-size:14px;font-weight:700;
            cursor:pointer;transition:var(--transition);
            display:flex;align-items:center;justify-content:center;gap:6px;
            margin-bottom:6px;
        }
        .btn-primary{background:var(--primary);color:#fff}
        .btn-primary:hover{background:var(--primary-light);box-shadow:0 4px 16px rgba(99,102,241,0.4)}
        .btn-success{background:var(--success);color:#fff}
        .btn-danger{background:var(--danger);color:#fff}
        .btn-warning{background:var(--warning);color:#000}
        .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
        .btn-sm{padding:8px 14px;width:auto;font-size:12px}
        .list-item{
            display:flex;align-items:center;justify-content:space-between;
            padding:10px 14px;background:var(--bg-card);border-radius:var(--radius-sm);
            margin-bottom:6px;border:1px solid var(--border);font-size:13px;
        }
        .tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--bg);border-radius:var(--radius-sm);padding:4px}
        .tab{
            flex:1;padding:9px;text-align:center;border-radius:var(--radius-sm);
            border:none;background:transparent;color:var(--text-secondary);
            font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:var(--transition);
        }
        .tab.active{background:var(--primary);color:#fff}
        .admin-page{display:none}
        .admin-page.active{display:block}
        .toast{
            position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-120px);
            background:var(--bg-card);border:1px solid var(--border);
            border-radius:var(--radius-md);padding:12px 20px;
            font-weight:700;font-size:14px;z-index:999;
            transition:transform 0.4s ease;text-align:center;box-shadow:var(--shadow);
        }
        .toast.show{transform:translateX(-50%) translateY(0)}
        .toast.success{border-color:var(--success)}.toast.error{border-color:var(--danger)}
        .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
        .stat-card{
            background:var(--bg-card);border-radius:var(--radius-md);
            padding:16px;text-align:center;border:1px solid var(--border);
        }
        .stat-value{font-size:28px;font-weight:900;color:var(--primary)}
        .stat-label{font-size:11px;color:var(--text-secondary);margin-top:4px}
        .color-input{height:40px;padding:4px;cursor:pointer}
    </style>
</head>
<body>

    <div class="toast" id="toast"></div>

    <div class="app">
        <div class="header">
            <h2>👑 لوحة الأدمن</h2>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
                <button class="icon-btn" onclick="window.location.href='index.html'">🏠</button>
            </div>
        </div>

        <!-- الرئيسية -->
        <div class="admin-page active" id="adminMain">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="statUsers">0</div><div class="stat-label">👥 مستخدمين</div></div>
                <div class="stat-card"><div class="stat-value" id="statOrders">0</div><div class="stat-label">📦 طلبات</div></div>
                <div class="stat-card"><div class="stat-value" id="statRevenue">0$</div><div class="stat-label">💰 إيرادات</div></div>
                <div class="stat-card"><div class="stat-value" id="statSources">0</div><div class="stat-label">🔌 مصادر</div></div>
            </div>
            <button class="btn btn-primary" onclick="showPage('generalSettings')">🎨 التخصيص العام</button>
            <button class="btn btn-primary" onclick="showPage('sliderSettings')">🖼 السلايدرات والترحيب</button>
            <button class="btn btn-primary" onclick="showPage('categoriesPage')">📂 إدارة الأقسام</button>
            <button class="btn btn-primary" onclick="showPage('itemsPage')">📦 إدارة السلع</button>
            <button class="btn btn-primary" onclick="showPage('usersPage')">👥 إدارة المستخدمين</button>
            <button class="btn btn-primary" onclick="showPage('sourcesPage')">🔌 إدارة المصادر</button>
            <button class="btn btn-warning" onclick="showPage('broadcastPage')">📢 إذاعة</button>
            <button class="btn btn-primary" onclick="showPage('socialPage')">📱 روابط التواصل</button>
            <button class="btn btn-primary" onclick="showPage('groupsPage')">🤖 إعدادات الغروبات</button>
            <button class="btn btn-primary" onclick="showPage('paymentPage')">💳 طرق الدفع</button>
            <button class="btn btn-primary" onclick="showPage('vipPage')">👑 مستويات VIP</button>
            <button class="btn btn-primary" onclick="showPage('channelsPage')">📢 الاشتراك الإجباري</button>
            <button class="btn btn-outline" onclick="window.location.href='index.html'">🏠 فتح المتجر</button>
        </div>

        <div class="admin-page" id="generalSettings"></div>
        <div class="admin-page" id="sliderSettings"></div>
        <div class="admin-page" id="categoriesPage"></div>
        <div class="admin-page" id="itemsPage"></div>
        <div class="admin-page" id="usersPage"></div>
        <div class="admin-page" id="sourcesPage"></div>
        <div class="admin-page" id="broadcastPage"></div>
        <div class="admin-page" id="socialPage"></div>
        <div class="admin-page" id="groupsPage"></div>
        <div class="admin-page" id="paymentPage"></div>
        <div class="admin-page" id="vipPage"></div>
        <div class="admin-page" id="channelsPage"></div>
    </div>

    <script>
        // ═══════════════ API Client (مدمج) ═══════════════
        const API_PATTERNS = {
            'dev_hamza': {
                name: 'Dev-Hamza الموحد', auth_type: 'header', auth_key: 'api-token',
                endpoints: { profile: '/profile', products: '/products', createOrder: '/newOrder/{product_id}/params', checkOrder: '/check' },
                status_completed: ['accept','done','completed','success','accepted','ok','complete'],
                status_rejected: ['reject','rejected','fail','failed','error','cancel','cancelled'],
                status_pending: ['wait','pending','processing','in_progress']
            }
        };

        async function httpReq(url, opts = {}) {
            const { method = 'GET', headers = {}, body = null, timeout = 15000, retries = 2 } = opts;
            const ctrl = new AbortController();
            const tid = setTimeout(() => ctrl.abort(), timeout);
            const hdrs = { 'Accept': 'application/json', 'Content-Type': 'application/json', 'User-Agent': 'TopVex/1.0', ...headers };
            for (let a = 0; a <= retries; a++) {
                try {
                    const fo = { method, headers: hdrs, signal: ctrl.signal };
                    if (body && method !== 'GET') fo.body = typeof body === 'string' ? body : JSON.stringify(body);
                    let u = url;
                    if (method === 'GET' && body && typeof body === 'object') {
                        u = `${url}${url.includes('?')?'&':'?'}${new URLSearchParams(body)}`;
                    }
                    const r = await fetch(u, fo); clearTimeout(tid);
                    if (!r.ok) { if (a < retries) { await new Promise(x => setTimeout(x, 1000 * (a + 1))); continue; } return null; }
                    return await r.json();
                } catch (e) {
                    clearTimeout(tid);
                    if (a < retries) { await new Promise(x => setTimeout(x, 1000 * (a + 1))); continue; }
                    return null;
                }
            }
        }

        class MSAPI {
            static getHeaders(src) {
                const p = API_PATTERNS[src.api_pattern || 'dev_hamza'] || API_PATTERNS['dev_hamza'];
                const h = {};
                if (p.auth_type === 'header') h[p.auth_key] = src.api_token || '';
                return h;
            }
            static cleanUrl(u) { return (u || '').replace(/\/(api-docs|docs|swagger).*$/,'').replace(/\/$/,''); }
            static buildUrls(src, path, params = {}) {
                const base = this.cleanUrl(src.api_url || '');
                let p = path;
                for (const [k, v] of Object.entries(params)) p = p.replace(`{${k}}`, v);
                const c = [];
                if (base.endsWith('/api/client')) c.push(`${base}${p}`);
                else if (base.endsWith('/api')) { c.push(`${base}/client${p}`); c.push(`${base}/client/api${p}`); }
                else { c.push(`${base}/api/client${p}`); c.push(`${base}/client/api${p}`); }
                return [...new Set(c)];
            }
            static async tryReq(urls, headers, method = 'GET', body = null) {
                for (const u of urls) {
                    const r = await httpReq(u, { method, headers, body });
                    if (r && !r.error) return { result: r, url: u };
                }
                return { result: null, url: null };
            }
            static getNested(data, path) {
                if (!data || typeof data !== 'object') return path === '' ? data : null;
                let c = data;
                for (const k of path.split('.')) { if (c && typeof c === 'object') c = c[k]; else return null; }
                return c;
            }
            static async getProfile(src) {
                try {
                    const h = this.getHeaders(src);
                    const urls = this.buildUrls(src, '/profile');
                    const { result } = await this.tryReq(urls, h);
                    if (!result || typeof result !== 'object') return { balance: 0, username: 'فشل الاتصال' };
                    let bal = 0;
                    for (const path of ['balance','data.balance','user.balance']) {
                        const v = this.getNested(result, path);
                        if (v !== null && v !== undefined) { bal = parseFloat(v) || 0; break; }
                    }
                    const username = result.username || result.name || this.getNested(result, 'data.username') || 'مستخدم';
                    return { balance: bal, username: String(username) };
                } catch { return { balance: 0, username: 'خطأ' }; }
            }
            static async getProducts(src) {
                try {
                    const h = this.getHeaders(src);
                    const urls = this.buildUrls(src, '/products');
                    const { result } = await this.tryReq(urls, h);
                    if (!result) return [];
                    if (Array.isArray(result)) return result;
                    if (typeof result === 'object') {
                        for (const k of ['data','products','services','items','result']) {
                            if (k in result && Array.isArray(result[k])) return result[k];
                        }
                        for (const [k, v] of Object.entries(result)) {
                            if (Array.isArray(v) && v.length > 0 && typeof v[0] === 'object' && 'id' in v[0]) return v;
                        }
                    }
                    return [];
                } catch { return []; }
            }
            static async testConnection(src) {
                try {
                    const profile = await this.getProfile(src);
                    const balance = parseFloat(profile.balance || -1);
                    const username = String(profile.username || '');
                    const success = balance >= 0 && !username.startsWith('خطأ') && username !== 'فشل الاتصال';
                    return { success, profile };
                } catch { return { success: false, profile: { balance: 0, username: 'فشل' } }; }
            }
        }

        // ═══════════════ التخزين ═══════════════
        function gD(k) { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } }
        function sD(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

        // ═══════════════ إعدادات ═══════════════
        const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
        const user = tg.initDataUnsafe?.user || {};
        const userId = user.id || 0;
        const admins = gD('admins') || [8257250965];
        if (!admins.includes(userId)) {
            document.body.innerHTML = '<div style="text-align:center;padding:100px 20px"><h2>⛔ غير مصرح</h2></div>';
        }

        let currentTheme = localStorage.getItem('theme') || 'dark';
        applyTheme(); updateStats();

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', currentTheme); applyTheme();
        }
        function applyTheme() {
            if (currentTheme === 'light') { document.body.classList.add('light-mode'); document.getElementById('themeBtn').textContent = '☀️'; }
            else { document.body.classList.remove('light-mode'); document.getElementById('themeBtn').textContent = '🌙'; }
        }
        function updateStats() {
            document.getElementById('statUsers').textContent = (gD('users') || []).length;
            document.getElementById('statOrders').textContent = (Object.keys(localStorage).filter(k => k.startsWith('orders_')).reduce((s, k) => s + (gD(k) || []).length, 0));
            document.getElementById('statSources').textContent = (gD('sources') || []).length;
            let rev = 0;
            Object.keys(localStorage).filter(k => k.startsWith('orders_')).forEach(k => {
                (gD(k) || []).forEach(o => { if (o.status === 'completed') rev += (o.price || 0); });
            });
            document.getElementById('statRevenue').textContent = rev.toFixed(2) + '$';
        }
        function showToast(m, t) {
            const el = document.getElementById('toast');
            el.textContent = m; el.className = 'toast ' + t + ' show';
            clearTimeout(el._t);
            el._t = setTimeout(() => el.classList.remove('show'), 2500);
        }

        // ═══════════════ التنقل ═══════════════
        function showPage(id) {
            document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active'));
            document.getElementById('adminMain').classList.remove('active');
            document.getElementById(id).classList.add('active');
            loadPage(id);
        }
        function goBack() {
            document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active'));
            document.getElementById('adminMain').classList.add('active');
            updateStats();
        }
        function loadPage(id) {
            const el = document.getElementById(id);
            let h = `<button class="btn btn-outline btn-sm" onclick="goBack()" style="margin-bottom:14px">⬅️ رجوع</button>`;
            switch (id) {
                case 'generalSettings': h += renderGeneralSettings(); break;
                case 'sliderSettings': h += renderSliderSettings(); break;
                case 'categoriesPage': h += renderCategoriesPage(); break;
                case 'itemsPage': h += renderItemsPage(); break;
                case 'usersPage': h += renderUsersPage(); break;
                case 'sourcesPage': h += renderSourcesPage(); break;
                case 'broadcastPage': h += renderBroadcastPage(); break;
                case 'socialPage': h += renderSocialPage(); break;
                case 'groupsPage': h += renderGroupsPage(); break;
                case 'paymentPage': h += renderPaymentPage(); break;
                case 'vipPage': h += renderVipPage(); break;
                case 'channelsPage': h += renderChannelsPage(); break;
            }
            el.innerHTML = h;
        }

        // ═══════════════ ١. التخصيص ═══════════════
        function renderGeneralSettings() {
            const s = gD('settings') || {};
            return `<div class="card">
                <div class="input-group"><label>🏪 اسم المتجر</label><input type="text" id="setStoreName" value="${s.storeName || 'ONE Store'}"></div>
                <div class="input-group"><label>🖼 رابط اللوقو</label><input type="text" id="setLogo" value="${s.logo || ''}" placeholder="https://i.ibb.co/..."></div>
                <div class="input-group"><label>🎨 اللون الرئيسي</label><input type="color" id="setColor" value="${s.primaryColor || '#6366f1'}" class="color-input"></div>
                <div class="input-group"><label>🖼 صورة الخلفية</label><input type="text" id="setBgImage" value="${s.bgImage || ''}" placeholder="https://i.ibb.co/... اتركه فارغاً للون"></div>
                <div class="input-group"><label>🎨 لون الخلفية</label><input type="color" id="setBgColor" value="${s.bgColor || '#0a0a0a'}" class="color-input"></div>
                <div class="input-group"><label>📝 رسالة الترحيب (البوت)</label><textarea id="setWelcome">${s.welcomeMsg || ''}</textarea></div>
                <div class="input-group"><label>🔧 رسالة الإيقاف</label><textarea id="setStopMsg">${s.stopMsg || '🔧 البوت في وضع الصيانة'}</textarea></div>
                <div class="input-group"><label>📞 يوزر الدعم</label><input type="text" id="setSupport" value="${s.supportUser || ''}" placeholder="TopVexSupport"></div>
                <div class="input-group"><label>📊 نسبة الربح (%)</label><input type="number" id="setProfit" value="${s.profitRate || 10}" step="0.1"></div>
                <button class="btn btn-success" onclick="saveGeneralSettings()">💾 حفظ</button>
            </div>`;
        }
        function saveGeneralSettings() {
            sD('settings', {
                storeName: document.getElementById('setStoreName').value,
                logo: document.getElementById('setLogo').value,
                primaryColor: document.getElementById('setColor').value,
                bgImage: document.getElementById('setBgImage').value,
                bgColor: document.getElementById('setBgColor').value,
                welcomeMsg: document.getElementById('setWelcome').value,
                stopMsg: document.getElementById('setStopMsg').value,
                supportUser: document.getElementById('setSupport').value,
                profitRate: parseFloat(document.getElementById('setProfit').value)
            });
            showToast('✅ تم الحفظ', 'success');
        }

        // ═══════════════ ٢. السلايدر ═══════════════
        function renderSliderSettings() {
            const imgs = gD('sliderImages') || [];
            const msgs = gD('welcomeMessages') || [];
            let h = `<div class="card"><h4>🖼 صور السلايدر</h4>`;
            imgs.forEach((img, i) => h += `<div class="list-item"><span>🖼 ${i+1}</span><button class="btn btn-danger btn-sm" onclick="removeSliderImg(${i})">🗑</button></div>`);
            h += `<div class="input-group"><label>رابط الصورة</label><input type="text" id="newSliderImg" placeholder="https://i.ibb.co/..."></div>
                <button class="btn btn-primary" onclick="addSliderImg()">➕ إضافة</button></div>`;
            h += `<div class="card"><h4>📝 رسائل الترحيب</h4>`;
            msgs.forEach((m, i) => h += `<div class="list-item"><span>${m.substring(0, 50)}</span><button class="btn btn-danger btn-sm" onclick="removeWelcomeMsg(${i})">🗑</button></div>`);
            h += `<div class="input-group"><label>رسالة جديدة</label><input type="text" id="newWelcomeMsg"></div>
                <button class="btn btn-primary" onclick="addWelcomeMsg()">➕ إضافة</button></div>`;
            return h;
        }
        function addSliderImg() {
            const url = document.getElementById('newSliderImg').value.trim();
            if (!url) { showToast('❌ أدخل رابطاً', 'error'); return; }
            const imgs = gD('sliderImages') || [];
            imgs.push({ image: url }); sD('sliderImages', imgs);
            showToast('✅ تم', 'success'); loadPage('sliderSettings');
        }
        function removeSliderImg(i) {
            const imgs = gD('sliderImages') || [];
            imgs.splice(i, 1); sD('sliderImages', imgs);
            showToast('🗑 تم', 'success'); loadPage('sliderSettings');
        }
        function addWelcomeMsg() {
            const m = document.getElementById('newWelcomeMsg').value.trim();
            if (!m) return;
            const msgs = gD('welcomeMessages') || [];
            msgs.push(m); sD('welcomeMessages', msgs);
            showToast('✅ تم', 'success'); loadPage('sliderSettings');
        }
        function removeWelcomeMsg(i) {
            const msgs = gD('welcomeMessages') || [];
            msgs.splice(i, 1); sD('welcomeMessages', msgs);
            showToast('🗑 تم', 'success'); loadPage('sliderSettings');
        }

        // ═══════════════ ٣. الأقسام ═══════════════
        function renderCategoriesPage() {
            const cats = gD('categories') || [];
            let h = `<div class="card">
                <div class="input-group"><label>📁 اسم القسم</label><input type="text" id="catName"></div>
                <div class="input-group"><label>🖼 رابط الصورة</label><input type="text" id="catImage" placeholder="https://i.ibb.co/..."></div>
                <button class="btn btn-primary" onclick="addCategory()">➕ إضافة قسم رئيسي</button>
            </div>`;
            h += cats.map(c => `<div class="list-item">
                <span>${c.parent_id ? '↳' : '📁'} ${c.name} <small style="color:var(--text-secondary)">ID:${c.id}</small></span>
                <div>
                    <button class="btn btn-primary btn-sm" onclick="addSubCategory(${c.id})">➕ فرعي</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteCategory(${c.id})">🗑</button>
                </div>
            </div>`).join('');
            return h;
        }
        function addCategory() {
            const n = document.getElementById('catName').value.trim();
            if (!n) { showToast('❌ أدخل اسماً', 'error'); return; }
            const img = document.getElementById('catImage').value.trim();
            const cats = gD('categories') || [];
            const id = cats.length > 0 ? Math.max(...cats.map(c => c.id)) + 1 : 1;
            cats.push({ id, name: n, parent_id: null, image: img }); sD('categories', cats);
            showToast('✅ تم', 'success'); loadPage('categoriesPage');
        }
        function addSubCategory(pid) {
            const n = prompt('اسم القسم الفرعي:');
            if (!n) return;
            const img = prompt('رابط الصورة (اختياري):') || '';
            const cats = gD('categories') || [];
            const id = cats.length > 0 ? Math.max(...cats.map(c => c.id)) + 1 : 1;
            cats.push({ id, name: n, parent_id: pid, image: img }); sD('categories', cats);
            showToast('✅ تم', 'success'); loadPage('categoriesPage');
        }
        function deleteCategory(id) {
            if (!confirm('متأكد؟')) return;
            let cats = gD('categories') || [];
            cats = cats.filter(c => c.id !== id && c.parent_id !== id); sD('categories', cats);
            showToast('🗑 تم', 'success'); loadPage('categoriesPage');
        }

        // ═══════════════ ٤. السلع ═══════════════
        function renderItemsPage() {
            const items = gD('items') || [];
            const cats = gD('categories') || [];
            const sources = gD('sources') || [];
            let h = `<div class="card">
                <h4>➕ إضافة سلعة</h4>
                <div class="input-group"><label>📦 اسم السلعة</label><input type="text" id="itemName"></div>
                <div class="input-group"><label>🖼 رابط صورة السلعة</label><input type="text" id="itemImage" placeholder="https://i.ibb.co/..."></div>
                <div class="input-group"><label>🟡 وصف السلعة</label><input type="text" id="itemDesc" placeholder="مثلاً: جوهرة - فري فاير فوري 100+10"></div>
                <div class="input-row">
                    <div class="input-group"><label>💰 السعر النهائي $</label><input type="number" id="itemPrice" step="0.01" value="0"></div>
                    <div class="input-group"><label>🔴 السعر الأصلي $</label><input type="number" id="itemOrigPrice" step="0.01" value="0"></div>
                </div>
                <div class="input-group"><label>📝 اسم حقل الإدخال</label><input type="text" id="itemInputLabel" value="معرف العملية" placeholder="مثلاً: ايدي اللاعب"></div>
                <div class="input-group"><label>نوع السلعة</label><select id="itemType"><option value="auto">🤖 تلقائي</option><option value="manual">✋ يدوي</option></select></div>
                <div class="input-group"><label>🔌 المصدر (للتلقائي)</label><select id="itemSource"><option value="">بدون مصدر</option>${sources.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}</select></div>
                <div class="input-group"><label>🆔 آيدي السلعة في المصدر</label><input type="text" id="itemApiId" placeholder="Product ID في API المصدر"></div>
                <div class="input-group"><label>📂 القسم</label><select id="itemCategory">${cats.map(c => `<option value="${c.id}">${c.parent_id ? '↳' : ''} ${c.name}</option>`).join('')}</select></div>
                <div class="input-group"><label>🟣 وصف إضافي (يظهر أسفل صفحة الشراء)</label><textarea id="itemExtraDesc" placeholder="مثلاً: هذا المنتج يعمل بشكل أوتوماتيكي 24 ساعة"></textarea></div>
                <button class="btn btn-success" onclick="addItem()">➕ إضافة السلعة</button>
            </div>`;
            h += `<h4>📋 السلع الحالية (${items.length})</h4>`;
            h += items.map(i => {
                const cat = cats.find(c => c.id === i.category_id);
                return `<div class="list-item">
                    <span>📦 ${i.name} <small>${i.type === 'auto' ? '🤖' : '✋'} ${cat ? cat.name : ''} | ${(i.price || 0).toFixed(2)}$</small></span>
                    <button class="btn btn-danger btn-sm" onclick="deleteItem(${i.id})">🗑</button>
                </div>`;
            }).join('');
            return h;
        }
        function addItem() {
            const name = document.getElementById('itemName').value.trim();
            if (!name) { showToast('❌ أدخل اسماً', 'error'); return; }
            const items = gD('items') || [];
            const id = items.length > 0 ? Math.max(...items.map(i => i.id)) + 1 : 1;
            items.push({
                id, name,
                image: document.getElementById('itemImage').value.trim(),
                description: document.getElementById('itemDesc').value.trim(),
                price: parseFloat(document.getElementById('itemPrice').value) || 0,
                original_price: parseFloat(document.getElementById('itemOrigPrice').value) || 0,
                input_label: document.getElementById('itemInputLabel').value.trim() || 'معرف العملية',
                type: document.getElementById('itemType').value,
                source_id: parseInt(document.getElementById('itemSource').value) || null,
                api_item_id: document.getElementById('itemApiId').value.trim(),
                category_id: parseInt(document.getElementById('itemCategory').value),
                extra_description: document.getElementById('itemExtraDesc').value.trim(),
                status: 1
            });
            sD('items', items);
            showToast('✅ تم', 'success'); loadPage('itemsPage');
        }
        function deleteItem(id) {
            if (!confirm('متأكد؟')) return;
            let items = gD('items') || [];
            items = items.filter(i => i.id !== id); sD('items', items);
            showToast('🗑 تم', 'success'); loadPage('itemsPage');
        }

        // ═══════════════ ٥. المستخدمين ═══════════════
        function renderUsersPage() {
            const users = gD('users') || [];
            let h = `<div class="card">
                <div class="input-group"><label>🆔 إضافة أدمن</label><input type="number" id="newAdminId" placeholder="ايدي المستخدم"></div>
                <button class="btn btn-success" onclick="addAdminUser()">👑 إضافة أدمن</button>
            </div>`;
            h += users.map(u => `<div class="list-item">
                <span>👤 ${u.id} | 💰 ${(u.balance || 0).toFixed(2)}$ | ${u.is_blocked ? '🚫' : '✅'}</span>
                <div>
                    <button class="btn btn-warning btn-sm" onclick="addBal(${u.id})">💰</button>
                    <button class="btn ${u.is_blocked ? 'btn-success' : 'btn-danger'} btn-sm" onclick="toggleBlock(${u.id})">${u.is_blocked ? '🔓' : '🚫'}</button>
                </div>
            </div>`).join('');
            return h;
        }
        function addAdminUser() {
            const id = parseInt(document.getElementById('newAdminId').value);
            if (!id) return;
            const adm = gD('admins') || [];
            if (!adm.includes(id)) { adm.push(id); sD('admins', adm); }
            showToast('✅ تم', 'success'); loadPage('usersPage');
        }
        function addBal(uid) {
            const amt = parseFloat(prompt('المبلغ (دولار):'));
            if (!amt || amt <= 0) return;
            let users = gD('users') || [];
            let u = users.find(x => x.id === uid);
            if (!u) { u = { id: uid, balance: 0, is_blocked: false, vip_level: 0 }; users.push(u); }
            u.balance = (u.balance || 0) + amt; sD('users', users);
            showToast('✅ تم', 'success'); loadPage('usersPage');
        }
        function toggleBlock(uid) {
            let users = gD('users') || [];
            let u = users.find(x => x.id === uid);
            if (!u) { u = { id: uid, balance: 0, is_blocked: false, vip_level: 0 }; users.push(u); }
            u.is_blocked = !u.is_blocked; sD('users', users);
            showToast('✅ تم', 'success'); loadPage('usersPage');
        }

        // ═══════════════ ٦. المصادر ═══════════════
        function renderSourcesPage() {
            const sources = gD('sources') || [];
            let h = `<div class="card">
                <h4>➕ إضافة مصدر</h4>
                <div class="input-group"><label>📝 اسم المصدر</label><input type="text" id="srcName"></div>
                <div class="input-group"><label>🌐 رابط API</label><input type="text" id="srcUrl" placeholder="https://..."></div>
                <div class="input-group"><label>🔑 API Token</label><input type="text" id="srcToken"></div>
                <button class="btn btn-success" onclick="addSource()">➕ إضافة</button>
            </div>`;
            h += sources.map(s => `<div class="list-item">
                <span>🔌 ${s.name} | ${(s.api_url || '').substring(0, 30)}...</span>
                <div>
                    <button class="btn btn-primary btn-sm" onclick="testSource(${s.id})">🔍 اختبار</button>
                    <button class="btn btn-primary btn-sm" onclick="fetchSourceProducts(${s.id})">📦 منتجات</button>
                    <button class="btn btn-warning btn-sm" onclick="changeToken(${s.id})">🔑 توكن</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteSource(${s.id})">🗑</button>
                </div>
            </div>`).join('');
            return h;
        }
        function addSource() {
            const n = document.getElementById('srcName').value.trim();
            const u = document.getElementById('srcUrl').value.trim();
            const t = document.getElementById('srcToken').value.trim();
            if (!n || !u) { showToast('❌ أكمل البيانات', 'error'); return; }
            const sources = gD('sources') || [];
            const id = sources.length > 0 ? Math.max(...sources.map(s => s.id)) + 1 : 1;
            sources.push({ id, name: n, api_url: u, api_token: t, api_pattern: 'dev_hamza', status: 1 });
            sD('sources', sources);
            showToast('✅ تم', 'success'); loadPage('sourcesPage');
        }
        function deleteSource(id) {
            if (!confirm('متأكد؟')) return;
            let sources = gD('sources') || [];
            sources = sources.filter(s => s.id !== id); sD('sources', sources);
            showToast('🗑 تم', 'success'); loadPage('sourcesPage');
        }
        async function testSource(id) {
            const sources = gD('sources') || [];
            const s = sources.find(x => x.id === id);
            if (!s) return;
            showToast('⏳ جاري...', 'success');
            const r = await MSAPI.testConnection(s);
            showToast(r.success ? `✅ متصل | 💰 ${r.profile.balance.toFixed(2)}$ | 👤 ${r.profile.username}` : '❌ فشل الاتصال', r.success ? 'success' : 'error');
        }
        async function fetchSourceProducts(id) {
            const sources = gD('sources') || [];
            const s = sources.find(x => x.id === id);
            if (!s) return;
            showToast('⏳ جاري جلب المنتجات...', 'success');
            const products = await MSAPI.getProducts(s);
            if (!products || products.length === 0) {
                showToast('⚠️ لا توجد منتجات', 'error');
                return;
            }
            const cats = gD('categories') || [];
            let list = products.slice(0, 50).map(p => `🆔 ${p.id} | ${p.name || '---'} | 💰 ${(parseFloat(p.price) || 0).toFixed(2)}$`).join('\n');
            alert(`📦 منتجات المصدر (${products.length}):\n\n${list}\n\nانسخ الآيدي واستخدمه في إضافة سلعة`);
        }
        function changeToken(id) {
            const nt = prompt('أدخل التوكن الجديد:');
            if (!nt) return;
            let sources = gD('sources') || [];
            const s = sources.find(x => x.id === id);
            if (s) { s.api_token = nt; sD('sources', sources); showToast('✅ تم', 'success'); loadPage('sourcesPage'); }
        }

        // ═══════════════ ٧. إذاعة ═══════════════
        function renderBroadcastPage() {
            return `<div class="card">
                <div class="input-group"><label>📢 نص الإذاعة</label><textarea id="broadcastMsg" placeholder="أدخل نص الإذاعة..."></textarea></div>
                <button class="btn btn-danger" onclick="sendBroadcast()">📢 إرسال للجميع (عبر البوت)</button>
            </div>`;
        }
        function sendBroadcast() {
            const msg = document.getElementById('broadcastMsg').value.trim();
            if (!msg) { showToast('❌ أدخل نصاً', 'error'); return; }
            if (!confirm('متأكد من الإرسال؟')) return;
            try {
                tg.sendData(JSON.stringify({ action: 'broadcast', data: msg }));
                showToast('📢 جاري الإرسال...', 'success');
            } catch(e) { showToast('❌ فشل', 'error'); }
        }

        // ═══════════════ ٨. التواصل ═══════════════
        function renderSocialPage() {
            const links = gD('socialLinks') || [];
            let h = links.map((l, i) => `<div class="list-item"><span>${l.icon} ${l.name}</span><button class="btn btn-danger btn-sm" onclick="removeSocial(${i})">🗑</button></div>`).join('');
            h += `<div class="card">
                <div class="input-row"><div class="input-group"><label>الاسم</label><input type="text" id="socName" placeholder="واتساب"></div><div class="input-group"><label>الأيقونة</label><input type="text" id="socIcon" placeholder="💬"></div></div>
                <div class="input-group"><label>الرابط</label><input type="text" id="socUrl" placeholder="https://..."></div>
                <button class="btn btn-primary" onclick="addSocial()">➕ إضافة</button>
            </div>`;
            return h;
        }
        function addSocial() {
            const name = document.getElementById('socName').value.trim();
            const icon = document.getElementById('socIcon').value.trim();
            const url = document.getElementById('socUrl').value.trim();
            if (!name || !url) return;
            const links = gD('socialLinks') || [];
            links.push({ name, icon: icon || '🔗', url });
            sD('socialLinks', links);
            showToast('✅ تم', 'success'); loadPage('socialPage');
        }
        function removeSocial(i) {
            const links = gD('socialLinks') || [];
            links.splice(i, 1); sD('socialLinks', links);
            showToast('🗑 تم', 'success'); loadPage('socialPage');
        }

        // ═══════════════ ٩. الغروبات ═══════════════
        function renderGroupsPage() {
            const groups = gD('groups') || {};
            return `<div class="card">
                <div class="input-group"><label>💰 إيداعات</label><input type="text" id="grpDeposits" value="${groups.deposits || ''}" placeholder="ايدي الغروب (سالب)"></div>
                <div class="input-group"><label>🤖 شحن تلقائي</label><input type="text" id="grpAuto" value="${groups.auto || ''}" placeholder="ايدي الغروب (سالب)"></div>
                <div class="input-group"><label>✋ شحن يدوي</label><input type="text" id="grpManual" value="${groups.manual || ''}" placeholder="ايدي الغروب (سالب)"></div>
                <div class="input-group"><label>🆕 مستخدمين جدد</label><input type="text" id="grpNewUsers" value="${groups.newUsers || ''}" placeholder="ايدي الغروب (سالب)"></div>
                <button class="btn btn-success" onclick="saveGroups()">💾 حفظ وإرسال للبوت</button>
            </div>`;
        }
        function saveGroups() {
            const groups = {
                deposits: document.getElementById('grpDeposits').value.trim(),
                auto: document.getElementById('grpAuto').value.trim(),
                manual: document.getElementById('grpManual').value.trim(),
                newUsers: document.getElementById('grpNewUsers').value.trim()
            };
            sD('groups', groups);
            try {
                tg.sendData(JSON.stringify({ action: 'update_groups', data: JSON.stringify(groups) }));
                showToast('✅ تم الحفظ وإرسال للبوت', 'success');
            } catch(e) { showToast('✅ تم الحفظ محلياً', 'success'); }
        }

        // ═══════════════ ١٠. الدفع ═══════════════
        function renderPaymentPage() {
            const methods = gD('paymentMethods') || [];
            let h = `<div class="card">
                <h4>➕ إضافة طريقة دفع</h4>
                <div class="input-group"><label>🖼 رابط صورة الطريقة</label><input type="text" id="payImage" placeholder="https://i.ibb.co/..."></div>
                <div class="input-group"><label>💳 اسم الطريقة</label><input type="text" id="payName" placeholder="شام كاش"></div>
                <div class="input-group"><label>🟡 رقم المحفظة</label><input type="text" id="payWallet" placeholder="Ja963BANB32XJrM1..."></div>
                <div class="input-group"><label>🟣 تعليمات الدفع</label><textarea id="payInstructions" placeholder="تتم الاضافة خلال 30 دقيقة..."></textarea></div>
                <div class="input-row">
                    <div class="input-group"><label>🔴 أقل مبلغ $</label><input type="number" id="payMin" value="5" step="0.01"></div>
                    <div class="input-group"><label>🔴 أعلى مبلغ $</label><input type="number" id="payMax" value="1000" step="0.01"></div>
                </div>
                <div class="input-group"><label>💱 سعر الصرف (1$ = ?)</label><input type="number" id="payRate" value="0" step="0.01"></div>
                <button class="btn btn-success" onclick="addPayment()">➕ إضافة</button>
            </div>`;
            h += methods.map((m, i) => `<div class="list-item">
                <span>💳 ${m.name} | ${m.wallet ? m.wallet.substring(0, 20) + '...' : ''}</span>
                <button class="btn btn-danger btn-sm" onclick="removePayment(${i})">🗑</button>
            </div>`).join('');
            return h;
        }
        function addPayment() {
            const name = document.getElementById('payName').value.trim();
            if (!name) { showToast('❌ أدخل اسماً', 'error'); return; }
            const methods = gD('paymentMethods') || [];
            const id = methods.length > 0 ? Math.max(...methods.map(x => x.id || 0)) + 1 : 1;
            methods.push({
                id, name,
                image: document.getElementById('payImage').value.trim(),
                wallet: document.getElementById('payWallet').value.trim(),
                instructions: document.getElementById('payInstructions').value.trim(),
                min_amount: parseFloat(document.getElementById('payMin').value) || 0,
                max_amount: parseFloat(document.getElementById('payMax').value) || 0,
                exchange_rate: parseFloat(document.getElementById('payRate').value) || 0
            });
            sD('paymentMethods', methods);
            showToast('✅ تم', 'success'); loadPage('paymentPage');
        }
        function removePayment(i) {
            const methods = gD('paymentMethods') || [];
            methods.splice(i, 1); sD('paymentMethods', methods);
            showToast('🗑 تم', 'success'); loadPage('paymentPage');
        }

        // ═══════════════ ١١. VIP ═══════════════
        function renderVipPage() {
            const levels = gD('vipLevels') || [
                { level: 1, name: 'VIP 1', discount: 5, required_orders: 0 },
                { level: 2, name: 'VIP 2', discount: 10, required_orders: 10 },
                { level: 3, name: 'VIP 3', discount: 15, required_orders: 25 },
                { level: 4, name: 'VIP 4', discount: 20, required_orders: 50 },
                { level: 5, name: 'VIP 5', discount: 25, required_orders: 100 }
            ];
            let h = levels.map((l, i) => `<div class="card">
                <h4>👑 ${l.name}</h4>
                <div class="input-row">
                    <div class="input-group"><label>الخصم %</label><input type="number" id="vipDisc${i}" value="${l.discount}"></div>
                    <div class="input-group"><label>الطلبات المطلوبة</label><input type="number" id="vipOrd${i}" value="${l.required_orders}"></div>
                </div>
            </div>`).join('');
            h += `<button class="btn btn-success" onclick="saveVip()">💾 حفظ</button>`;
            return h;
        }
        function saveVip() {
            const levels = gD('vipLevels') || [];
            levels.forEach((l, i) => {
                l.discount = parseInt(document.getElementById(`vipDisc${i}`).value) || 0;
                l.required_orders = parseInt(document.getElementById(`vipOrd${i}`).value) || 0;
            });
            sD('vipLevels', levels);
            showToast('✅ تم', 'success');
        }

        // ═══════════════ ١٢. اشتراك إجباري ═══════════════
        function renderChannelsPage() {
            const channels = gD('forcedChannels') || [];
            let h = `<div class="card">
                <div class="input-row"><div class="input-group"><label>اسم القناة</label><input type="text" id="chName"></div><div class="input-group"><label>ايدي القناة</label><input type="text" id="chId" placeholder="@xxx أو -100..."></div></div>
                <div class="input-group"><label>الرابط</label><input type="text" id="chUrl" placeholder="https://t.me/..."></div>
                <button class="btn btn-primary" onclick="addChannel()">➕ إضافة</button>
            </div>`;
            h += channels.map((c, i) => `<div class="list-item"><span>📢 ${c.name}</span><button class="btn btn-danger btn-sm" onclick="removeChannel(${i})">🗑</button></div>`).join('');
            return h;
        }
        function addChannel() {
            const n = document.getElementById('chName').value.trim();
            const id = document.getElementById('chId').value.trim();
            const url = document.getElementById('chUrl').value.trim();
            if (!n || !id) { showToast('❌ أكمل البيانات', 'error'); return; }
            const channels = gD('forcedChannels') || [];
            channels.push({ name: n, id, url, status: 1 });
            sD('forcedChannels', channels);
            showToast('✅ تم', 'success'); loadPage('channelsPage');
        }
        function removeChannel(i) {
            const channels = gD('forcedChannels') || [];
            channels.splice(i, 1); sD('forcedChannels', channels);
            showToast('🗑 تم', 'success'); loadPage('channelsPage');
        }

        // ═══════════════ انطلاق ═══════════════
        updateStats();
    </script>
</body>
