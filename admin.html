<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONE Store - لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --primary:#6366f1;--primary-light:#818cf8;
            --bg:#0a0a0a;--bg-card:#1a1a2e;--bg-card-hover:#252540;
            --text:#ffffff;--text-secondary:#a1a1aa;
            --border:rgba(255,255,255,0.1);--danger:#ef4444;
            --success:#10b981;--warning:#f59e0b;
            --radius-lg:20px;--radius-md:14px;--radius-sm:10px;
            --shadow:0 4px 24px rgba(0,0,0,0.4);--transition:all 0.3s ease;
        }
        body.light-mode{
            --bg:#f8fafc;--bg-card:#ffffff;--bg-card-hover:#f1f5f9;
            --text:#0f172a;--text-secondary:#64748b;
            --border:rgba(0,0,0,0.08);--shadow:0 4px 24px rgba(0,0,0,0.06);
        }
        body{
            font-family:'Cairo',-apple-system,sans-serif;
            background:var(--bg);color:var(--text);
            min-height:100vh;transition:var(--transition);padding-bottom:100px;
        }
        body::before{
            content:'';position:fixed;top:-50%;left:-50%;
            width:200%;height:200%;
            background:radial-gradient(ellipse at 30% 20%,rgba(99,102,241,0.1) 0%,transparent 50%),
                       radial-gradient(ellipse at 70% 60%,rgba(245,158,11,0.05) 0%,transparent 50%);
            pointer-events:none;z-index:0;transition:var(--transition);
        }
        .app{position:relative;z-index:1;max-width:550px;margin:0 auto;padding:12px}
        .header{
            display:flex;align-items:center;justify-content:space-between;
            padding:14px 8px;margin-bottom:16px;
            position:sticky;top:0;z-index:100;
            background:rgba(10,10,10,0.9);backdrop-filter:blur(20px);
            border-radius:0 0 var(--radius-lg) var(--radius-lg);
        }
        body.light-mode .header{background:rgba(255,255,255,0.9)}
        .header h2{font-size:20px;font-weight:800}
        .header-actions{display:flex;gap:6px}
        .icon-btn{
            width:40px;height:40px;border-radius:50%;border:none;
            background:var(--bg-card);color:var(--text);font-size:18px;
            cursor:pointer;display:flex;align-items:center;justify-content:center;
            transition:var(--transition);
        }
        .icon-btn:hover{background:var(--bg-card-hover)}
        .card{
            background:var(--bg-card);border-radius:var(--radius-md);
            padding:16px;margin-bottom:8px;border:1px solid var(--border);
            transition:var(--transition);
        }
        .input-group{margin-bottom:12px}
        .input-group label{display:block;font-size:12px;color:var(--text-secondary);margin-bottom:5px;font-weight:600}
        .input-group input,.input-group textarea,.input-group select{
            width:100%;padding:11px 14px;border-radius:var(--radius-sm);
            border:1px solid var(--border);background:var(--bg);
            color:var(--text);font-family:inherit;font-size:13px;
            transition:var(--transition);resize:vertical;
        }
        .input-group input:focus,.input-group textarea:focus,.input-group select:focus{
            outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,0.15);
        }
        .input-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .btn{
            width:100%;padding:12px;border-radius:var(--radius-sm);
            border:none;font-family:inherit;font-size:14px;font-weight:700;
            cursor:pointer;transition:var(--transition);
            display:flex;align-items:center;justify-content:center;gap:6px;
            margin-bottom:6px;
        }
        .btn-primary{background:var(--primary);color:#fff}
        .btn-primary:hover{background:var(--primary-light);box-shadow:0 4px 16px rgba(99,102,241,0.4)}
        .btn-success{background:var(--success);color:#fff}
        .btn-danger{background:var(--danger);color:#fff}
        .btn-warning{background:var(--warning);color:#000}
        .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
        .btn-sm{padding:8px 14px;width:auto;font-size:12px}
        .list-item{
            display:flex;align-items:center;justify-content:space-between;
            padding:10px 14px;background:var(--bg-card);border-radius:var(--radius-sm);
            margin-bottom:6px;border:1px solid var(--border);font-size:13px;
            flex-wrap:wrap;gap:8px;
        }
        .admin-page{display:none}
        .admin-page.active{display:block}
        .toast{
            position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-120px);
            background:var(--bg-card);border:1px solid var(--border);
            border-radius:var(--radius-md);padding:12px 20px;
            font-weight:700;font-size:14px;z-index:999;
            transition:transform 0.4s ease;text-align:center;box-shadow:var(--shadow);
        }
        .toast.show{transform:translateX(-50%) translateY(0)}
        .toast.success{border-color:var(--success)}.toast.error{border-color:var(--danger)}
        .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
        .stat-card{
            background:var(--bg-card);border-radius:var(--radius-md);
            padding:16px;text-align:center;border:1px solid var(--border);
        }
        .stat-value{font-size:28px;font-weight:900;color:var(--primary)}
        .stat-label{font-size:11px;color:var(--text-secondary);margin-top:4px}
        .color-input{height:40px;padding:4px;cursor:pointer}
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="app">
    <div class="header">
        <h2>👑 لوحة التحكم</h2>
        <div class="header-actions">
            <button class="icon-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
            <button class="icon-btn" onclick="window.location.href='index.html'">🏠</button>
        </div>
    </div>

    <div class="admin-page active" id="adminMain">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" id="statUsers">0</div><div class="stat-label">👥 مستخدمين</div></div>
            <div class="stat-card"><div class="stat-value" id="statOrders">0</div><div class="stat-label">📦 طلبات</div></div>
            <div class="stat-card"><div class="stat-value" id="statRevenue">0$</div><div class="stat-label">💰 إيرادات</div></div>
            <div class="stat-card"><div class="stat-value" id="statSources">0</div><div class="stat-label">🔌 مصادر</div></div>
        </div>
        <button class="btn btn-primary" onclick="showPage('generalSettings')">🎨 التخصيص العام</button>
        <button class="btn btn-primary" onclick="showPage('sliderSettings')">🖼 السلايدرات والترحيب</button>
        <button class="btn btn-primary" onclick="showPage('categoriesPage')">📂 إدارة الأقسام</button>
        <button class="btn btn-primary" onclick="showPage('itemsPage')">📦 إدارة السلع</button>
        <button class="btn btn-primary" onclick="showPage('usersPage')">👥 إدارة المستخدمين</button>
        <button class="btn btn-primary" onclick="showPage('adminsPage')">👑 المشرفين</button>
        <button class="btn btn-primary" onclick="showPage('sourcesPage')">🔌 المصادر</button>
        <button class="btn btn-primary" onclick="showPage('paymentPage')">💳 طرق الدفع</button>
        <button class="btn btn-primary" onclick="showPage('vipPage')">👑 مستويات VIP</button>
        <button class="btn btn-primary" onclick="showPage('currenciesPage')">💱 العملات</button>
        <button class="btn btn-primary" onclick="showPage('socialPage')">📱 روابط التواصل</button>
        <button class="btn btn-primary" onclick="showPage('groupsPage')">🤖 الغروبات</button>
        <button class="btn btn-outline" onclick="window.location.href='index.html'">🏠 فتح المتجر</button>
    </div>

    <div class="admin-page" id="generalSettings"></div>
    <div class="admin-page" id="sliderSettings"></div>
    <div class="admin-page" id="categoriesPage"></div>
    <div class="admin-page" id="itemsPage"></div>
    <div class="admin-page" id="usersPage"></div>
    <div class="admin-page" id="adminsPage"></div>
    <div class="admin-page" id="sourcesPage"></div>
    <div class="admin-page" id="paymentPage"></div>
    <div class="admin-page" id="vipPage"></div>
    <div class="admin-page" id="currenciesPage"></div>
    <div class="admin-page" id="socialPage"></div>
    <div class="admin-page" id="groupsPage"></div>
</div>

<script>
let currentTheme = localStorage.getItem('theme') || 'dark';
applyTheme(); updateStats();

const gD=(k)=>{try{return JSON.parse(localStorage.getItem(k));}catch{return null;}};
const sD=(k,v)=>{localStorage.setItem(k,JSON.stringify(v));};
const showToast=(m,t)=>{const el=document.getElementById('toast');el.textContent=m;el.className='toast '+t+' show';clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2500);};
const fixImg=(u)=>{if(!u)return'';u=String(u).trim();if(u.includes('ibb.co')&&!u.includes('i.ibb.co')){u=u.replace('ibb.co','i.ibb.co');if(!u.match(/\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i))u+='.jpg';}return u;};

function toggleTheme(){currentTheme=currentTheme==='dark'?'light':'dark';localStorage.setItem('theme',currentTheme);applyTheme();}
function applyTheme(){
    if(currentTheme==='light'){document.body.classList.add('light-mode');document.getElementById('themeBtn').textContent='☀️';}
    else{document.body.classList.remove('light-mode');document.getElementById('themeBtn').textContent='🌙';}
}
function updateStats(){
    document.getElementById('statUsers').textContent=(gD('users')||[]).length;
    const orders=gD('orders')||[];
    document.getElementById('statOrders').textContent=orders.length;
    document.getElementById('statRevenue').textContent=orders.filter(o=>o.status==='completed').reduce((s,o)=>s+(o.price||0),0).toFixed(2)+'$';
    document.getElementById('statSources').textContent=(gD('sources')||[]).length;
}

function showPage(id){
    document.querySelectorAll('.admin-page').forEach(p=>p.classList.remove('active'));
    document.getElementById('adminMain').classList.remove('active');
    document.getElementById(id).classList.add('active');
    loadPage(id);
}
function goBack(){document.querySelectorAll('.admin-page').forEach(p=>p.classList.remove('active'));document.getElementById('adminMain').classList.add('active');updateStats();}

function loadPage(id){
    const el=document.getElementById(id);
    let h=`<button class="btn btn-outline btn-sm" onclick="goBack()" style="margin-bottom:14px">⬅️ رجوع</button>`;
    switch(id){
        case'generalSettings':h+=renderGeneralSettings();break;
        case'sliderSettings':h+=renderSliderSettings();break;
        case'categoriesPage':h+=renderCategoriesPage();break;
        case'itemsPage':h+=renderItemsPage();break;
        case'usersPage':h+=renderUsersPage();break;
        case'adminsPage':h+=renderAdminsPage();break;
        case'sourcesPage':h+=renderSourcesPage();break;
        case'paymentPage':h+=renderPaymentPage();break;
        case'vipPage':h+=renderVipPage();break;
        case'currenciesPage':h+=renderCurrenciesPage();break;
        case'socialPage':h+=renderSocialPage();break;
        case'groupsPage':h+=renderGroupsPage();break;
    }
    el.innerHTML=h;
}

// ═══════════ ١. التخصيص العام ═══════════
function renderGeneralSettings(){
    const s=gD('settings')||{};
    return`<div class="card">
        <div class="input-group"><label>🏪 اسم المتجر</label><input type="text" id="setStoreName" value="${s.storeName||'ONE Store'}"></div>
        <div class="input-group"><label>🖼 رابط اللوقو</label><input type="text" id="setLogo" value="${s.logo||''}"></div>
        <div class="input-group"><label>📞 رقم الهاتف</label><input type="text" id="setPhone" value="${s.phone||''}"></div>
        <div class="input-group"><label>🌐 رابط الموقع</label><input type="text" id="setWebsite" value="${s.website||''}"></div>
        <div class="input-group"><label>📝 نص صفحة "حول"</label><textarea id="setAboutText">${s.aboutText||'متجركم الأول لشحن جميع الخدمات الإلكترونية'}</textarea></div>
        <div class="input-group"><label>🎨 اللون الرئيسي</label><input type="color" id="setColor" value="${s.primaryColor||'#6366f1'}" class="color-input"></div>
        <div class="input-group"><label>🖼 صورة الخلفية</label><input type="text" id="setBgImage" value="${s.bgImage||''}"></div>
        <div class="input-group"><label>🎨 لون الخلفية</label><input type="color" id="setBgColor" value="${s.bgColor||'#0a0a0a'}" class="color-input"></div>
        <div class="input-group"><label>📱 عدد الأقسام بالسطر</label><select id="setGridCols"><option value="2" ${(s.gridCols||2)==2?'selected':''}>2 أعمدة</option><option value="3" ${(s.gridCols||2)==3?'selected':''}>3 أعمدة</option></select></div>
        <button class="btn btn-success" onclick="saveGeneralSettings()">💾 حفظ</button>
    </div>`;
}
function saveGeneralSettings(){
    sD('settings',{
        storeName:document.getElementById('setStoreName').value,
        logo:document.getElementById('setLogo').value,
        phone:document.getElementById('setPhone').value,
        website:document.getElementById('setWebsite').value,
        aboutText:document.getElementById('setAboutText').value,
        primaryColor:document.getElementById('setColor').value,
        bgImage:document.getElementById('setBgImage').value,
        bgColor:document.getElementById('setBgColor').value,
        gridCols:parseInt(document.getElementById('setGridCols').value)
    });
    showToast('✅ تم الحفظ','success');
}

// ═══════════ ٢. السلايدر ═══════════
function renderSliderSettings(){
    const imgs=gD('sliderImages')||[];
    const msgs=gD('welcomeMessages')||[];
    let h=`<div class="card"><h4>🖼 صور السلايدر</h4>`;
    imgs.forEach((img,i)=>h+=`<div class="list-item"><span>🖼 ${i+1}</span><button class="btn btn-danger btn-sm" onclick="removeSliderImg(${i})">🗑</button></div>`);
    h+=`<div class="input-group"><label>رابط الصورة</label><input type="text" id="newSliderImg"></div>
        <div class="input-group"><label>🔗 رابط الضغط على الصورة</label><input type="text" id="newSliderLink" placeholder="https://t.me/..."></div>
        <button class="btn btn-primary" onclick="addSliderImg()">➕ إضافة</button></div>`;
    h+=`<div class="card"><h4>📝 رسائل الترحيب</h4>`;
    msgs.forEach((m,i)=>h+=`<div class="list-item"><span>${m.substring(0,50)}</span><button class="btn btn-danger btn-sm" onclick="removeWelcomeMsg(${i})">🗑</button></div>`);
    h+=`<div class="input-group"><label>رسالة جديدة</label><input type="text" id="newWelcomeMsg"></div>
        <button class="btn btn-primary" onclick="addWelcomeMsg()">➕ إضافة</button></div>`;
    return h;
}
function addSliderImg(){
    const u=document.getElementById('newSliderImg').value.trim();
    const l=document.getElementById('newSliderLink').value.trim();
    if(!u){showToast('❌ أدخل رابطاً','error');return;}
    const imgs=gD('sliderImages')||[];
    imgs.push({image:u,link:l});
    sD('sliderImages',imgs);
    showToast('✅ تم','success');loadPage('sliderSettings');
}
function removeSliderImg(i){const imgs=gD('sliderImages')||[];imgs.splice(i,1);sD('sliderImages',imgs);showToast('🗑 تم','success');loadPage('sliderSettings');}
function addWelcomeMsg(){const m=document.getElementById('newWelcomeMsg').value.trim();if(!m)return;const msgs=gD('welcomeMessages')||[];msgs.push(m);sD('welcomeMessages',msgs);showToast('✅ تم','success');loadPage('sliderSettings');}
function removeWelcomeMsg(i){const msgs=gD('welcomeMessages')||[];msgs.splice(i,1);sD('welcomeMessages',msgs);showToast('🗑 تم','success');loadPage('sliderSettings');}

// ═══════════ ٣. الأقسام ═══════════
function renderCategoriesPage(){
    const cats=gD('categories')||[];
    let h=`<div class="card"><div class="input-group"><label>📁 اسم القسم</label><input type="text" id="catName"></div><div class="input-group"><label>🖼 رابط الصورة</label><input type="text" id="catImage"></div><button class="btn btn-primary" onclick="addCategory()">➕ إضافة قسم رئيسي</button></div>`;
    h+=cats.map(c=>`<div class="list-item"><span>${c.parent_id?'↳':'📁'} ${c.name} <small style="color:var(--text-secondary)">ID:${c.id}</small></span><div><button class="btn btn-primary btn-sm" onclick="addSubCategory(${c.id})">➕ فرعي</button><button class="btn btn-danger btn-sm" onclick="deleteCategory(${c.id})">🗑</button></div></div>`).join('');
    return h;
}
function addCategory(){const n=document.getElementById('catName').value.trim();if(!n){showToast('❌ أدخل اسماً','error');return;}const img=document.getElementById('catImage').value.trim();const cats=gD('categories')||[];const id=cats.length>0?Math.max(...cats.map(c=>c.id))+1:1;cats.push({id,name:n,parent_id:null,image:img});sD('categories',cats);showToast('✅ تم','success');loadPage('categoriesPage');}
function addSubCategory(pid){const n=prompt('اسم القسم الفرعي:');if(!n)return;const img=prompt('رابط الصورة (اختياري):')||'';const cats=gD('categories')||[];const id=cats.length>0?Math.max(...cats.map(c=>c.id))+1:1;cats.push({id,name:n,parent_id:pid,image:img});sD('categories',cats);showToast('✅ تم','success');loadPage('categoriesPage');}
function deleteCategory(id){if(!confirm('متأكد؟'))return;let cats=gD('categories')||[];cats=cats.filter(c=>c.id!==id&&c.parent_id!==id);sD('categories',cats);showToast('🗑 تم','success');loadPage('categoriesPage');}

// ═══════════ ٤. السلع ═══════════
function renderItemsPage(){
    const items=gD('items')||[];
    const cats=gD('categories')||[];
    const sources=gD('sources')||[];
    let h=`<div class="card"><h4>➕ إضافة سلعة</h4>
        <div class="input-group"><label>📦 اسم السلعة</label><input type="text" id="itemName"></div>
        <div class="input-group"><label>🖼 رابط صورة السلعة</label><input type="text" id="itemImage"></div>
        <div class="input-group"><label>🟡 وصف السلعة</label><input type="text" id="itemDesc" placeholder="مثلاً: جوهرة - فري فاير فوري 100+10"></div>
        <div class="input-row"><div class="input-group"><label>💰 السعر النهائي $</label><input type="number" id="itemPrice" step="0.01" value="0"></div><div class="input-group"><label>🔴 السعر الأصلي $</label><input type="number" id="itemOrigPrice" step="0.01" value="0"></div></div>
        <div class="input-group"><label>📝 اسم حقل الإدخال</label><input type="text" id="itemInputLabel" value="معرف العملية"></div>
        <div class="input-group"><label>نوع السلعة</label><select id="itemType"><option value="auto">🤖 تلقائي</option><option value="manual">✋ يدوي</option></select></div>
        <div class="input-group"><label>🔌 المصدر (للتلقائي)</label><select id="itemSource"><option value="">بدون مصدر</option>${sources.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div>
        <div class="input-group"><label>🆔 آيدي السلعة في المصدر</label><input type="text" id="itemApiId" placeholder="Product ID"></div>
        <button class="btn btn-warning btn-sm" onclick="syncPriceFromSource()">🔄 مزامنة السعر من المصدر</button>
        <div class="input-group"><label>📂 القسم</label><select id="itemCategory">${cats.map(c=>`<option value="${c.id}">${c.parent_id?'↳':''} ${c.name}</option>`).join('')}</select></div>
        <button class="btn btn-success" onclick="addItem()">➕ إضافة السلعة</button>
    </div>`;
    h+=`<h4>📋 السلع (${items.length})</h4>`;
    h+=items.map(i=>{const cat=cats.find(c=>c.id===i.category_id);return`<div class="list-item"><span>📦 ${i.name} <small>${i.type==='auto'?'🤖':'✋'} ${cat?cat.name:''} | ${(i.price||0).toFixed(2)}$</small></span><button class="btn btn-danger btn-sm" onclick="deleteItem(${i.id})">🗑</button></div>`;}).join('');
    return h;
}
function addItem(){
    const name=document.getElementById('itemName').value.trim();if(!name){showToast('❌ أدخل اسماً','error');return;}
    const items=gD('items')||[];const id=items.length>0?Math.max(...items.map(i=>i.id))+1:1;
    items.push({id,name,image:document.getElementById('itemImage').value.trim(),description:document.getElementById('itemDesc').value.trim(),price:parseFloat(document.getElementById('itemPrice').value)||0,original_price:parseFloat(document.getElementById('itemOrigPrice').value)||0,input_label:document.getElementById('itemInputLabel').value.trim()||'معرف العملية',type:document.getElementById('itemType').value,source_id:parseInt(document.getElementById('itemSource').value)||null,api_item_id:document.getElementById('itemApiId').value.trim(),category_id:parseInt(document.getElementById('itemCategory').value),status:1});
    sD('items',items);showToast('✅ تم','success');loadPage('itemsPage');
}
function deleteItem(id){if(!confirm('متأكد؟'))return;let items=gD('items')||[];items=items.filter(i=>i.id!==id);sD('items',items);showToast('🗑 تم','success');loadPage('itemsPage');}
async function syncPriceFromSource(){
    const sid=parseInt(document.getElementById('itemSource').value);const aid=document.getElementById('itemApiId').value.trim();
    if(!sid||!aid){showToast('❌ اختر مصدراً وأدخل آيدي','error');return;}
    const sources=gD('sources')||[];const src=sources.find(s=>s.id===sid);if(!src)return;
    showToast('⏳ جاري جلب السعر...','success');
    try{
        const products=await MSAPI.getProducts(src);
        const product=products.find(p=>String(p.id)===String(aid));
        if(product){const price=parseFloat(product.price||0);document.getElementById('itemPrice').value=price.toFixed(2);document.getElementById('itemOrigPrice').value=price.toFixed(2);showToast(`✅ السعر: ${price.toFixed(2)}$`,'success');}
        else showToast('❌ لم يتم العثور على السلعة','error');
    }catch(e){showToast('❌ فشل','error');}
}

// ═══════════ ٥. المستخدمين ═══════════
function renderUsersPage(){
    const users=gD('users')||[];
    let h=`<div class="card"><h4>🔍 استعلام</h4><div class="input-group"><label>🆔 آيدي الحساب</label><input type="number" id="queryUserId"></div><button class="btn btn-primary" onclick="queryUser()">🔍 استعلام</button><div id="queryResult" style="margin-top:12px"></div></div><h4>👥 جميع المستخدمين (${users.length})</h4>`;
    h+=users.map(u=>`<div class="list-item"><div style="flex:1"><span>👤 ${u.name||'مستخدم'} <small style="color:var(--primary)">#${u.id}</small></span><div style="font-size:11px;color:var(--text-secondary)">💰 ${(u.balance||0).toFixed(2)}$ | ${u.is_blocked?'🚫 محظور':'✅ نشط'} | VIP:${u.vip_level||0} | 📧${u.email||''}</div></div><div style="display:flex;gap:4px;flex-wrap:wrap"><button class="btn btn-success btn-sm" onclick="addBal(${u.id})">💰</button><button class="btn btn-warning btn-sm" onclick="removeBal(${u.id})">💸</button><button class="btn btn-primary btn-sm" onclick="promoteVip(${u.id})">👑VIP</button><button class="btn ${u.is_blocked?'btn-success':'btn-danger'} btn-sm" onclick="toggleBlock(${u.id})">${u.is_blocked?'🔓':'🚫'}</button></div></div>`).join('');
    return h;
}
function queryUser(){
    const id=parseInt(document.getElementById('queryUserId').value);if(!id)return;
    const users=gD('users')||[];const u=users.find(x=>x.id===id);
    const r=document.getElementById('queryResult');
    if(!u)r.innerHTML='<p style="color:var(--danger)">❌ غير موجود</p>';
    else r.innerHTML=`<div class="card"><p>🆔 ${u.id}</p><p>👤 ${u.name}</p><p>📧 ${u.email}</p><p>📱 ${u.phone}</p><p>💰 ${(u.balance||0).toFixed(2)}$</p><p>👑 VIP:${u.vip_level||0}</p><p>🚫 ${u.is_blocked?'محظور':'نشط'}</p></div>`;
}
function addBal(uid){const amt=parseFloat(prompt('المبلغ (دولار):'));if(!amt||amt<=0)return;let users=gD('users')||[];let u=users.find(x=>x.id===uid);if(!u)return;u.balance=(u.balance||0)+amt;sD('users',users);showToast('✅ تم','success');loadPage('usersPage');}
function removeBal(uid){const amt=parseFloat(prompt('المبلغ المراد سحبه:'));if(!amt||amt<=0)return;let users=gD('users')||[];let u=users.find(x=>x.id===uid);if(!u)return;u.balance=Math.max(0,(u.balance||0)-amt);sD('users',users);showToast(`✅ تم سحب ${amt.toFixed(2)}$`,'success');loadPage('usersPage');}
function promoteVip(uid){
    const levels=gD('vipLevels')||[{level:1,name:'VIP 1',discount:5},{level:2,name:'VIP 2',discount:10},{level:3,name:'VIP 3',discount:15},{level:4,name:'VIP 4',discount:20},{level:5,name:'VIP 5',discount:25}];
    let msg='اختر مستوى VIP:\n\n';levels.forEach(l=>msg+=`${l.level}. ${l.name} (خصم ${l.discount}%)\n`);
    const lv=parseInt(prompt(msg+'أدخل الرقم:'));if(!lv||lv<1||lv>5)return;
    let users=gD('users')||[];let u=users.find(x=>x.id===uid);if(!u)return;
    u.vip_level=lv;sD('users',users);showToast(`✅ تم ترقية ${uid} إلى VIP ${lv}`,'success');loadPage('usersPage');
}
function toggleBlock(uid){let users=gD('users')||[];let u=users.find(x=>x.id===uid);if(!u)return;u.is_blocked=!u.is_blocked;sD('users',users);showToast('✅ تم','success');loadPage('usersPage');}

// ═══════════════════════════════════════════
// 🔌 API Client - يدعم جميع المتاجر
// ═══════════════════════════════════════════
class MSAPI {
    static getHeaders(src){return{'Accept':'application/json','Content-Type':'application/json','api-token':src.api_token||''};}
    static cleanUrl(u){u=(u||'').replace(/\/(api-docs|docs|swagger|api-docs\.html)\/?.*$/,'').replace(/\/+$/,'');return u;}
    static buildAllUrls(src,endpoint,params={}){
        const base=this.cleanUrl(src.api_url||'');let path=endpoint;
        for(const[k,v]of Object.entries(params))path=path.replace(`{${k}}`,v);
        const urls=[];
        urls.push(`${base}/api/client${path}`);
        urls.push(`${base}/client/api${path}`);
        if(base.endsWith('/api'))urls.push(`${base}${path}`);
        if(!base.match(/\/(api|client)\/?$/)){urls.push(`${base}${path}`);urls.push(`${base}/api${path}`);}
        urls.push(`${base}${path}`);
        return[...new Set(urls)];
    }
    static async tryUrls(urls,headers,method='GET',body=null){
        for(const url of urls){
            try{
                const opts={method,headers};
                if(body&&method!=='GET')opts.body=typeof body==='string'?body:JSON.stringify(body);
                let finalUrl=url;
                if(method==='GET'&&body&&typeof body==='object'){const qs=new URLSearchParams(body).toString();finalUrl=`${url}${url.includes('?')?'&':'?'}${qs}`;}
                const res=await fetch(finalUrl,opts);
                if(res.ok){const data=await res.json();if(data&&!data.error)return{result:data,url:finalUrl};}
            }catch(e){continue;}
        }
        return{result:null,url:null};
    }
    static getNested(data,path){if(!data||typeof data!=='object')return path===''?data:null;let c=data;for(const k of path.split('.')){if(c&&typeof c==='object')c=c[k];else return null;}return c;}
    static async getProfile(src){
        try{
            const h=this.getHeaders(src);const urls=this.buildAllUrls(src,'/profile');
            const{result}=await this.tryUrls(urls,h);
            if(!result||typeof result!=='object')return{balance:0,username:'فشل الاتصال',success:false};
            let bal=0;
            for(const path of['balance','data.balance','user.balance','wallet','credit','money']){const v=this.getNested(result,path);if(v!==null&&v!==undefined){bal=parseFloat(v)||0;break;}}
            const username=result.username||result.name||this.getNested(result,'data.username')||'مستخدم';
            return{balance:bal,username:String(username),success:true};
        }catch(e){return{balance:0,username:'خطأ',success:false};}
    }
    static async getProducts(src){
        try{
            const h=this.getHeaders(src);const urls=this.buildAllUrls(src,'/products');
            const{result}=await this.tryUrls(urls,h);
            if(!result)return[];
            if(Array.isArray(result))return result;
            if(typeof result==='object'){for(const k of['data','products','services','items','result','list']){if(k in result&&Array.isArray(result[k]))return result[k];}}
            return[];
        }catch(e){return[];}
    }
    static async createOrder(src,productId,quantity=1,playerId="0"){
        try{
            const h=this.getHeaders(src);
            const uuid='xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);});
            const params={qty:String(parseFloat(quantity)),playerId:String(playerId),order_uuid:uuid};
            const getUrls=this.buildAllUrls(src,'/newOrder/{product_id}/params',{product_id:productId});
            const getFullUrls=getUrls.map(u=>`${u}?${new URLSearchParams(params)}`);
            let{result}=await this.tryUrls(getFullUrls,h,'GET');
            if(!result){
                const postUrls=this.buildAllUrls(src,'/newOrder/{product_id}/params',{product_id:productId});
                const postResult=await this.tryUrls(postUrls,h,'POST',params);
                result=postResult.result;
            }
            if(!result||typeof result!=='object')return{order_id:uuid,status:'error',message:'لا يوجد رد من المصدر'};
            let orderId=result.order_id||this.getNested(result,'data.order_id')||result.id||result.orderId||uuid;
            const st=String(result.status||this.getNested(result,'data.status')||'').toLowerCase();
            const comp=['accept','done','completed','success','accepted','ok'];
            const rej=['reject','rejected','fail','failed','error','cancel'];
            let finalStatus='error';
            if(comp.includes(st))finalStatus='completed';
            else if(rej.includes(st))finalStatus='rejected';
            else if(['wait','pending','processing'].includes(st))finalStatus='pending';
            else if(orderId)finalStatus='processing';
            return{order_id:String(orderId),order_uuid:uuid,status:finalStatus,message:result.message||this.getNested(result,'data.message')||'',price:parseFloat(result.price||this.getNested(result,'data.price')||0)};
        }catch(e){return{order_id:null,status:'error',message:String(e).substring(0,100)};}
    }
    static async checkOrder(src,orderId){
        try{
            const h=this.getHeaders(src);const ids=JSON.stringify([String(orderId)]);
            const urls=this.buildAllUrls(src,'/check');
            const fullUrls=urls.map(u=>{const sep=u.includes('?')?'&':'?';return`${u}${sep}orders=${encodeURIComponent(ids)}`;});
            const{result}=await this.tryUrls(fullUrls,h);
            if(!result||typeof result!=='object')return null;
            let dataList=result.data||[];
            if(!Array.isArray(dataList))dataList=[dataList];
            if(dataList.length>0){const od=dataList[0];const st=String(od.status||'').toLowerCase();const comp=['accept','done','completed','success'];const rej=['reject','rejected','fail','failed','error','cancel'];if(comp.includes(st))return{status:'completed',data:od};if(rej.includes(st))return{status:'rejected',data:od};return{status:'pending',data:od};}
            return null;
        }catch(e){return null;}
    }
    static async testConnection(src){try{const p=await this.getProfile(src);return{success:p.success,profile:p};}catch(e){return{success:false,profile:{balance:0,username:'فشل'}};}}
}

// ═══════════ ٧. المصادر ═══════════
function renderSourcesPage(){
    const sources=gD('sources')||[];
    let h=`<div class="card"><h4>➕ إضافة مصدر</h4>
        <div class="input-group"><label>📝 اسم المصدر</label><input type="text" id="srcName"></div>
        <div class="input-group"><label>🌐 رابط API</label><input type="text" id="srcUrl" placeholder="https://..."></div>
        <div class="input-group"><label>🔑 API Token</label><input type="text" id="srcToken"></div>
        <button class="btn btn-success" onclick="addSource()">➕ إضافة</button>
    </div>`;
    h+=sources.map(s=>`<div class="list-item">
        <span>🔌 ${s.name} | ${(s.api_url||'').substring(0,30)}...</span>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
            <button class="btn btn-success btn-sm" onclick="fetchBal(${s.id})">💰 رصيد</button>
            <button class="btn btn-primary btn-sm" onclick="testSource(${s.id})">🔍 اختبار</button>
            <button class="btn btn-primary btn-sm" onclick="fetchSourceProds(${s.id})">📦 منتجات</button>
            <button class="btn btn-warning btn-sm" onclick="changeToken(${s.id})">🔑 توكن</button>
            <button class="btn btn-danger btn-sm" onclick="deleteSource(${s.id})">🗑</button>
        </div>
    </div>`).join('');
    return h;
}
function addSource(){const n=document.getElementById('srcName').value.trim(),u=document.getElementById('srcUrl').value.trim(),t=document.getElementById('srcToken').value.trim();if(!n||!u){showToast('❌ أكمل البيانات','error');return;}const sources=gD('sources')||[];const id=sources.length>0?Math.max(...sources.map(s=>s.id))+1:1;sources.push({id,name:n,api_url:u,api_token:t,api_pattern:'dev_hamza',status:1});sD('sources',sources);showToast('✅ تم','success');loadPage('sourcesPage');}
function deleteSource(id){if(!confirm('متأكد؟'))return;let sources=gD('sources')||[];sources=sources.filter(s=>s.id!==id);sD('sources',sources);showToast('🗑 تم','success');loadPage('sourcesPage');}
async function fetchBal(id){const sources=gD('sources')||[];const s=sources.find(x=>x.id===id);if(!s)return;showToast('⏳ جاري...','success');const r=await MSAPI.getProfile(s);showToast(r.success?`✅ الرصيد: ${r.balance.toFixed(2)}$ | 👤 ${r.username}`:`❌ ${r.username}`,'success');}
async function testSource(id){const sources=gD('sources')||[];const s=sources.find(x=>x.id===id);if(!s)return;showToast('⏳ اختبار...','success');const r=await MSAPI.testConnection(s);showToast(r.success?`✅ متصل | 💰 ${r.profile.balance.toFixed(2)}$`:'❌ فشل',r.success?'success':'error');}
function changeToken(id){const nt=prompt('أدخل التوكن الجديد:');if(!nt)return;let sources=gD('sources')||[];const s=sources.find(x=>x.id===id);if(s){s.api_token=nt;sD('sources',sources);showToast('✅ تم','success');loadPage('sourcesPage');}}
async function fetchSourceProds(id){
    const sources=gD('sources')||[];const s=sources.find(x=>x.id===id);if(!s)return;
    showToast('⏳ جاري جلب المنتجات...','success');
    const products=await MSAPI.getProducts(s);
    if(!products||!products.length){showToast('❌ لا توجد منتجات','error');return;}
    sD('temp_source_products',products);sD('temp_source_id',id);
    let h=`<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:500;overflow-y:auto;padding:20px"><div style="max-width:500px;margin:0 auto;background:var(--bg-card);border-radius:var(--radius-lg);padding:20px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3>📦 منتجات ${s.name}</h3><button class="icon-btn" onclick="this.closest('div').parentElement.parentElement.remove()" style="background:var(--danger);color:#fff;width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;font-size:18px">✕</button></div>
    <div class="input-group"><input type="text" id="productSearch" placeholder="🔍 بحث عن منتج..." oninput="filterProds()" style="width:100%;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:inherit;font-size:14px"></div>
    <div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px">📊 ${products.length} منتج</div>
    <div id="productsList" style="max-height:400px;overflow-y:auto">`;
    products.slice(0,100).forEach(p=>{
        const pid=p.id||p.product_id||'---',name=p.name||p.product_name||p.title||'بدون اسم',price=parseFloat(p.price||0).toFixed(2);
        h+=`<div class="list-item product-item" data-id="${pid}" data-name="${name.replace(/"/g,'&quot;')}" data-price="${price}">
            <div style="flex:1"><div style="font-weight:700;font-size:14px">${name}</div><div style="font-size:12px;color:var(--text-secondary)">🆔 ${pid} | 💰 ${price}$</div></div>
            <div style="display:flex;gap:4px">
                <button class="btn btn-success btn-sm" onclick="event.stopPropagation();addItemFromSource('${pid}','${name.replace(/'/g,"\\'")}',${price})">➕ إضافة</button>
                <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();copyID('${pid}')">📋 نسخ</button>
            </div>
        </div>`;
    });
    h+=`</div><button class="btn btn-outline" style="margin-top:12px" onclick="this.closest('div').parentElement.parentElement.remove()">🔙 إغلاق</button></div></div>`;
    document.body.insertAdjacentHTML('beforeend',h);
}
function filterProds(){const s=document.getElementById('productSearch').value.toLowerCase().trim();document.querySelectorAll('.product-item').forEach(i=>{const n=i.getAttribute('data-name').toLowerCase(),id=i.getAttribute('data-id').toLowerCase();i.style.display=(n.includes(s)||id.includes(s)||s==='')?'flex':'none';});}
function addItemFromSource(apiId,name,price){
    const cats=gD('categories')||[];
    if(!cats.length){showToast('❌ أضف قسماً أولاً','error');return;}
    const items=gD('items')||[];const newId=items.length>0?Math.max(...items.map(i=>i.id))+1:1;
    const sid=gD('temp_source_id')||null;
    items.push({id:newId,name,price,original_price:price,type:'auto',api_item_id:apiId,source_id:sid,category_id:cats[0].id,input_label:'معرف العملية',description:name,status:1});
    sD('items',items);showToast(`✅ تم إضافة: ${name}`,'success');
    document.querySelector('[style*="position:fixed"][style*="z-index:500"]')?.remove();
    if(document.getElementById('itemsPage').classList.contains('active'))loadPage('itemsPage');
}
function copyID(text){if(navigator.clipboard){navigator.clipboard.writeText(text);showToast('✅ تم النسخ: '+text,'success');}else prompt('انسخ الآيدي:',text);}

    let h=`<div class="card"><h4>➕ إضافة طريقة دفع</h4>
        <div class="input-group"><label>🖼 رابط صورة الطريقة</label><input type="text" id="payImage"></div>

        <div class="input-group"><label>🟣 تعليمات الدفع</label><textarea id="payInstructions" placeholder="تتم الاضافة خلال 30 دقيقة..."></textarea></div>
        <div class="input-row"><div class="input-group"><label>🔴 أقل مبلغ $</label><input type="number" id="payMin" value="5" step="0.01"></div><div class="input-group"><label>🔴 أعلى مبلغ $</label><input type="number" id="payMax" value="1000" step="0.01"></div></div>

function addPayment(){const n=document.getElementById('payName').value.trim();if(!n){showToast('❌ أدخل اسماً','error');return;}const methods=gD('paymentMethods')||[];const id=methods.length>0?Math.max(...methods.map(x=>x.id||0))+1:1;methods.push({id,name:n,image:document.getElementById('payImage').value.trim(),wallet:document.getElementById('payWallet').value.trim(),instructions:document.getElementById('payInstructions').value.trim(),min_amount:parseFloat(document.getElementById('payMin').value)||0,max_amount:parseFloat(document.getElementById('payMax').value)||0});sD('paymentMethods',methods);showToast('✅ تم','success');loadPage('paymentPage');}
function removePayment(i){const methods=gD('paymentMethods')||[];methods.splice(i,1);sD('paymentMethods',methods);showToast('🗑 تم','success');loadPage('paymentPage');}

    const levels=gD('vipLevels')||[{level:1,name:'VIP 1',discount:5,required_orders:0},{level:2,name:'VIP 2',discount:10,required_orders:10},{level:3,name:'VIP 3',discount:15,required_orders:25},{level:4,name:'VIP 4',discount:20,required_orders:50},{level:5,name:'VIP 5',discount:25,required_orders:100}];

    return h;
}
function addCurrency(){const code=document.getElementById('curCode').value.trim(),name=document.getElementById('curName').value.trim(),symbol=document.getElementById('curSymbol').value.trim(),rate=parseFloat(document.getElementById('curRate').value)||0;if(!code||!name){showToast('❌ أكمل البيانات','error');return;}const currencies=gD('currencies')||[{code:'USD',name:'دولار',rate:1,symbol:'$'}];currencies.push({code,name,symbol,rate});sD('currencies',currencies);showToast('✅ تم','success');loadPage('currenciesPage');}
function removeCurrency(i){const currencies=gD('currencies')||[];if(i===0){showToast('❌ لا يمكن حذف العملة الافتراضية','error');return;}currencies.splice(i,1);sD('currencies',currencies);showToast('🗑 تم','success');loadPage('currenciesPage');}

// ═══════════ ١١. التواصل ═══════════
function renderSocialPage(){
    const links=gD('socialLinks')||[];
    let h=links.map((l,i)=>`<div class="list-item"><span>${l.icon} ${l.name}</span><button class="btn btn-danger btn-sm" onclick="removeSocial(${i})">🗑</button></div>`).join('');
    h+=`<div class="card"><div class="input-row"><div class="input-group"><label>الاسم</label><input type="text" id="socName"></div><div class="input-group"><label>الأيقونة</label><input type="text" id="socIcon" placeholder="💬"></div></div><div class="input-group"><label>الرابط</label><input type="text" id="socUrl" placeholder="https://..."></div><button class="btn btn-primary" onclick="addSocial()">➕ إضافة</button></div>`;
    return h;
}
function addSocial(){const n=document.getElementById('socName').value.trim(),i=document.getElementById('socIcon').value.trim(),u=document.getElementById('socUrl').value.trim();if(!n||!u)return;const links=gD('socialLinks')||[];links.push({name:n,icon:i||'🔗',url:u});sD('socialLinks',links);showToast('✅ تم','success');loadPage('socialPage');}
function removeSocial(i){const links=gD('socialLinks')||[];links.splice(i,1);sD('socialLinks',links);showToast('🗑 تم','success');loadPage('socialPage');}

// ═══════════ ١٢. الغروبات ═══════════
function renderGroupsPage(){
    return`<div class="card" onclick="loadGroupData('deposits')"><h4>💰 الإيداعات</h4><p>طلبات شحن الرصيد</p></div>
    <div class="card" onclick="loadGroupData('manual_orders')"><h4>✋ الطلبات اليدوية</h4><p>طلبات بانتظار المراجعة</p></div>
    <div class="card" onclick="loadGroupData('auto_orders')"><h4>🤖 الطلبات التلقائية</h4><p>طلبات الشحن التلقائي</p></div>
    <div class="card" onclick="loadGroupData('new_users')"><h4>🆕 المستخدمين الجدد</h4><p>سجل المستخدمين</p></div>`;
}
function loadGroupData(type){
    let data=[];
    if(type==='deposits')data=gD('deposits')||[];
    else if(type==='manual_orders')data=(gD('orders')||[]).filter(o=>o.type==='manual'&&o.status==='pending');
    else if(type==='auto_orders')data=(gD('orders')||[]).filter(o=>o.type==='auto'&&o.status==='pending');
    else if(type==='new_users')data=gD('users')||[];
    
    const page=document.getElementById('groupsPage');
    const titles={deposits:'💰 الإيداعات',manual_orders:'✋ الطلبات اليدوية',auto_orders:'🤖 الطلبات التلقائية',new_users:'🆕 المستخدمين الجدد'};
    let h=`<button class="btn btn-outline btn-sm" onclick="goBack()">⬅️ رجوع</button><h3>${titles[type]}</h3>`;
    
    if(data.length===0){h+='<p style="text-align:center;margin:40px;color:var(--text-secondary)">لا توجد عناصر</p>';}
    else if(type==='new_users'){
        h+=data.map(u=>`<div class="list-item"><div><strong>👤 ${u.name||'مستخدم'}</strong> (#${u.id})</div><div style="font-size:12px;color:var(--text-secondary)">📧 ${u.email||''} | 📱 ${u.phone||''} | 📅 ${(u.created_at||'').substring(0,10)}</div></div>`).join('');
    }else{
        data.forEach(item=>{
            if(item.status==='pending'||type==='deposits'){
                h+=`<div class="card"><p><strong>👤 المستخدم:</strong> ${item.user_id}</p><p><strong>💰 المبلغ:</strong> ${item.amount||item.price} $</p><p><strong>📝:</strong> ${item.item_name||item.method||''}</p>${item.ref?`<p><strong>🔖 المرجع:</strong> ${item.ref}</p>`:''}<div style="display:flex;gap:6px;margin-top:8px"><button class="btn btn-success btn-sm" onclick="approveItem('${type}','${item.id}')">✅ قبول</button><button class="btn btn-danger btn-sm" onclick="rejectItem('${type}','${item.id}')">❌ رفض</button></div></div>`;
            }
        });
    }
    page.innerHTML=h;
    showPage('groupsPage');
}
function approveItem(type,itemId){
    if(type==='deposits'){
        let deposits=gD('deposits')||[];
        const dep=deposits.find(d=>d.id===itemId);
        if(dep){dep.status='approved';
            let users=gD('users')||[];let u=users.find(x=>x.id===dep.user_id);
            if(u){u.balance=(u.balance||0)+(dep.amount||0);sD('users',users);}
            sD('deposits',deposits);
        }
    }else{
        let orders=gD('orders')||[];const order=orders.find(o=>o.id===itemId);
        if(order){order.status='completed';sD('orders',orders);}
    }
    showToast('✅ تمت الموافقة','success');loadGroupData(type);
}
function rejectItem(type,itemId){
    if(type==='deposits'){let deposits=gD('deposits')||[];const dep=deposits.find(d=>d.id===itemId);if(dep){dep.status='rejected';sD('deposits',deposits);}}
    else{let orders=gD('orders')||[];const order=orders.find(o=>o.id===itemId);if(order){order.status='rejected';sD('orders',orders);}}
    showToast('❌ تم الرفض','success');loadGroupData(type);
}

updateStats();
</script>
