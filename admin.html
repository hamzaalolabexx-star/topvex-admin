<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONE Store - لوحة الأدمن</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --primary:#6366f1;
            --primary-light:#818cf8;
            --bg:#0a0a0a;
            --bg-card:#1a1a2e;
            --bg-card-hover:#252540;
            --text:#ffffff;
            --text-secondary:#a1a1aa;
            --border:rgba(255,255,255,0.1);
            --danger:#ef4444;
            --success:#10b981;
            --warning:#f59e0b;
            --radius-lg:20px;
            --radius-md:14px;
            --radius-sm:10px;
            --shadow:0 4px 24px rgba(0,0,0,0.4);
            --transition:all 0.3s ease;
        }
        body.light-mode{
            --bg:#f8fafc;
            --bg-card:#ffffff;
            --bg-card-hover:#f1f5f9;
            --text:#0f172a;
            --text-secondary:#64748b;
            --border:rgba(0,0,0,0.08);
            --shadow:0 4px 24px rgba(0,0,0,0.06);
        }
        body{
            font-family:'Cairo',-apple-system,sans-serif;
            background:var(--bg);
            color:var(--text);
            min-height:100vh;
            transition:var(--transition);
            padding-bottom:100px;
        }
        body::before{
            content:'';
            position:fixed;
            top:-50%;left:-50%;
            width:200%;height:200%;
            background:radial-gradient(ellipse at 30% 20%,rgba(99,102,241,0.1) 0%,transparent 50%),
                       radial-gradient(ellipse at 70% 60%,rgba(245,158,11,0.05) 0%,transparent 50%);
            pointer-events:none;
            z-index:0;
            transition:var(--transition);
        }
        .app{position:relative;z-index:1;max-width:550px;margin:0 auto;padding:12px}

        /* هيدر */
        .header{
            display:flex;align-items:center;justify-content:space-between;
            padding:14px 8px;margin-bottom:16px;
            position:sticky;top:0;z-index:100;
            background:rgba(10,10,10,0.9);backdrop-filter:blur(20px);
            border-radius:0 0 var(--radius-lg) var(--radius-lg);
        }
        body.light-mode .header{background:rgba(255,255,255,0.9)}
        .header h2{font-size:20px;font-weight:800}
        .header-actions{display:flex;gap:6px}
        .icon-btn{
            width:40px;height:40px;border-radius:50%;
            border:none;background:var(--bg-card);color:var(--text);
            font-size:18px;cursor:pointer;display:flex;
            align-items:center;justify-content:center;
            transition:var(--transition);
        }
        .icon-btn:hover{background:var(--bg-card-hover)}

        /* أقسام الأدمن */
        .section{margin-bottom:14px}
        .section-title{
            font-size:15px;font-weight:800;margin:18px 0 10px;
            display:flex;align-items:center;gap:8px;
            color:var(--primary-light);
        }
        .section-title::after{
            content:'';flex:1;height:2px;
            background:linear-gradient(to left,var(--primary),transparent);
            border-radius:2px;
        }

        /* كروت */
        .card{
            background:var(--bg-card);border-radius:var(--radius-md);
            padding:16px;margin-bottom:8px;
            border:1px solid var(--border);transition:var(--transition);
        }
        .card:hover{border-color:var(--primary-light)}

        /* حقول */
        .input-group{margin-bottom:12px}
        .input-group label{display:block;font-size:12px;color:var(--text-secondary);margin-bottom:5px;font-weight:600}
        .input-group input,.input-group textarea,.input-group select{
            width:100%;padding:11px 14px;border-radius:var(--radius-sm);
            border:1px solid var(--border);background:var(--bg);
            color:var(--text);font-family:inherit;font-size:13px;
            transition:var(--transition);resize:vertical;
        }
        .input-group input:focus,.input-group textarea:focus,.input-group select:focus{
            outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,0.15);
        }
        .input-group textarea{min-height:70px}
        .input-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

        /* أزرار */
        .btn{
            width:100%;padding:12px;border-radius:var(--radius-sm);
            border:none;font-family:inherit;font-size:14px;font-weight:700;
            cursor:pointer;transition:var(--transition);
            display:flex;align-items:center;justify-content:center;gap:6px;
            margin-bottom:6px;
        }
        .btn-primary{background:var(--primary);color:#fff}
        .btn-primary:hover{background:var(--primary-light);box-shadow:0 4px 16px rgba(99,102,241,0.4)}
        .btn-success{background:var(--success);color:#fff}
        .btn-danger{background:var(--danger);color:#fff}
        .btn-warning{background:var(--warning);color:#000}
        .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
        .btn-sm{padding:8px 14px;width:auto;font-size:12px}

        /* قائمة */
        .list-item{
            display:flex;align-items:center;justify-content:space-between;
            padding:10px 14px;background:var(--bg-card);border-radius:var(--radius-sm);
            margin-bottom:6px;border:1px solid var(--border);
            font-size:13px;
        }

        /* تبويبات */
        .tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--bg);border-radius:var(--radius-sm);padding:4px}
        .tab{
            flex:1;padding:9px;text-align:center;border-radius:var(--radius-sm);
            border:none;background:transparent;color:var(--text-secondary);
            font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;
            transition:var(--transition);
        }
        .tab.active{background:var(--primary);color:#fff}

        /* صفحة مخفية */
        .admin-page{display:none}
        .admin-page.active{display:block}

        /* Toast */
        .toast{
            position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-120px);
            background:var(--bg-card);border:1px solid var(--border);
            border-radius:var(--radius-md);padding:12px 20px;
            font-weight:700;font-size:14px;z-index:999;
            transition:transform 0.4s ease;text-align:center;
            box-shadow:var(--shadow);
        }
        .toast.show{transform:translateX(-50%) translateY(0)}
        .toast.success{border-color:var(--success)}
        .toast.error{border-color:var(--danger)}

        /* إحصائيات */
        .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
        .stat-card{
            background:var(--bg-card);border-radius:var(--radius-md);
            padding:16px;text-align:center;border:1px solid var(--border);
        }
        .stat-value{font-size:28px;font-weight:900;color:var(--primary)}
        .stat-label{font-size:11px;color:var(--text-secondary);margin-top:4px}
    </style>
</head>
<body>

    <div class="toast" id="toast"></div>

    <div class="app">
        <!-- الهيدر -->
        <div class="header">
            <h2>👑 لوحة الأدمن</h2>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
                <button class="icon-btn" onclick="window.location.href='index.html'">🏠</button>
            </div>
        </div>

        <!-- الصفحة الرئيسية للأدمن -->
        <div class="admin-page active" id="adminMain">
            <!-- إحصائيات -->
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="statUsers">0</div><div class="stat-label">👥 مستخدمين</div></div>
                <div class="stat-card"><div class="stat-value" id="statOrders">0</div><div class="stat-label">📦 طلبات</div></div>
                <div class="stat-card"><div class="stat-value" id="statRevenue">0$</div><div class="stat-label">💰 إيرادات</div></div>
                <div class="stat-card"><div class="stat-value" id="statSources">0</div><div class="stat-label">🔌 مصادر</div></div>
            </div>

            <button class="btn btn-primary" onclick="showPage('generalSettings')">🎨 التخصيص العام</button>
            <button class="btn btn-primary" onclick="showPage('sliderSettings')">🖼 السلايدرات والترحيب</button>
            <button class="btn btn-primary" onclick="showPage('categoriesPage')">📂 إدارة الأقسام</button>
            <button class="btn btn-primary" onclick="showPage('itemsPage')">📦 إدارة السلع</button>
            <button class="btn btn-primary" onclick="showPage('usersPage')">👥 إدارة المستخدمين</button>
            <button class="btn btn-primary" onclick="showPage('sourcesPage')">🔌 إدارة المصادر</button>
            <button class="btn btn-warning" onclick="showPage('broadcastPage')">📢 إذاعة</button>
            <button class="btn btn-primary" onclick="showPage('socialPage')">📱 روابط التواصل</button>
            <button class="btn btn-primary" onclick="showPage('groupsPage')">🤖 إعدادات الغروبات</button>
            <button class="btn btn-primary" onclick="showPage('paymentPage')">💳 طرق الدفع</button>
            <button class="btn btn-primary" onclick="showPage('vipPage')">👑 مستويات VIP</button>
            <button class="btn btn-primary" onclick="showPage('channelsPage')">📢 الاشتراك الإجباري</button>
            <button class="btn btn-outline" onclick="window.location.href='index.html'">🏠 فتح المتجر</button>
        </div>

        <!-- صفحات فرعية -->
        <div class="admin-page" id="generalSettings"></div>
        <div class="admin-page" id="sliderSettings"></div>
        <div class="admin-page" id="categoriesPage"></div>
        <div class="admin-page" id="itemsPage"></div>
        <div class="admin-page" id="usersPage"></div>
        <div class="admin-page" id="sourcesPage"></div>
        <div class="admin-page" id="broadcastPage"></div>
        <div class="admin-page" id="socialPage"></div>
        <div class="admin-page" id="groupsPage"></div>
        <div class="admin-page" id="paymentPage"></div>
        <div class="admin-page" id="vipPage"></div>
        <div class="admin-page" id="channelsPage"></div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        
        const user = tg.initDataUnsafe?.user || {};
        const userId = user.id || 0;
        const admins = JSON.parse(localStorage.getItem('admins') || '[8257250965]');
        
        // منع غير الأدمنز
        if (!admins.includes(userId)) {
            document.body.innerHTML = '<div style="text-align:center;padding:100px 20px"><h2>⛔ غير مصرح</h2><p>هذه الصفحة مخصصة للأدمن فقط</p></div>';
        }

        let currentTheme = localStorage.getItem('theme') || 'dark';
        applyTheme();
        updateStats();

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', currentTheme);
            applyTheme();
        }

        function applyTheme() {
            if (currentTheme === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('themeBtn').textContent = '☀️';
            } else {
                document.body.classList.remove('light-mode');
                document.getElementById('themeBtn').textContent = '🌙';
            }
        }

        function updateStats() {
            document.getElementById('statUsers').textContent = (JSON.parse(localStorage.getItem('users') || '[]')).length;
            document.getElementById('statOrders').textContent = (JSON.parse(localStorage.getItem('orders') || '[]')).length;
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const revenue = orders.filter(o => o.status === 'completed').reduce((s, o) => s + (o.price || 0), 0);
            document.getElementById('statRevenue').textContent = revenue.toFixed(2) + '$';
            document.getElementById('statSources').textContent = (JSON.parse(localStorage.getItem('sources') || '[]')).length;
        }

        // ==========================================
        // التنقل
        // ==========================================
        function showPage(pageId) {
            document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active'));
            document.getElementById('adminMain').classList.remove('active');
            document.getElementById(pageId).classList.add('active');
            loadPage(pageId);
        }

        function goBack() {
            document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active'));
            document.getElementById('adminMain').classList.add('active');
            updateStats();
        }

        function loadPage(pageId) {
            const content = document.getElementById(pageId);
            let html = `<button class="btn btn-outline btn-sm" onclick="goBack()" style="margin-bottom:14px">⬅️ رجوع للقائمة</button>`;

            switch(pageId) {
                case 'generalSettings':
                    html += renderGeneralSettings();
                    break;
                case 'sliderSettings':
                    html += renderSliderSettings();
                    break;
                case 'categoriesPage':
                    html += renderCategoriesPage();
                    break;
                case 'itemsPage':
                    html += renderItemsPage();
                    break;
                case 'usersPage':
                    html += renderUsersPage();
                    break;
                case 'sourcesPage':
                    html += renderSourcesPage();
                    break;
                case 'broadcastPage':
                    html += renderBroadcastPage();
                    break;
                case 'socialPage':
                    html += renderSocialPage();
                    break;
                case 'groupsPage':
                    html += renderGroupsPage();
                    break;
                case 'paymentPage':
                    html += renderPaymentPage();
                    break;
                case 'vipPage':
                    html += renderVipPage();
                    break;
                case 'channelsPage':
                    html += renderChannelsPage();
                    break;
            }
            content.innerHTML = html;
        }

        // ==========================================
        // ١. التخصيص العام
        // ==========================================
        function renderGeneralSettings() {
            const s = JSON.parse(localStorage.getItem('settings') || '{}');
            return `
                <div class="card">
                    <div class="input-group"><label>🏪 اسم المتجر</label><input type="text" id="setStoreName" value="${s.storeName || 'ONE Store'}"></div>
                    <div class="input-group"><label>🖼 رابط اللوقو</label><input type="text" id="setLogo" value="${s.logo || ''}" placeholder="https://..."></div>
                    <div class="input-group"><label>🎨 اللون الرئيسي</label><input type="color" id="setColor" value="${s.primaryColor || '#6366f1'}" style="height:40px;padding:4px"></div>
                    <div class="input-group"><label>🖼 رابط صورة الخلفية</label><input type="text" id="setBgImage" value="${s.bgImage || ''}" placeholder="https://... اتركه فارغاً للون"></div>
                    <div class="input-group"><label>🎨 لون الخلفية</label><input type="color" id="setBgColor" value="${s.bgColor || '#0a0a0a'}" style="height:40px;padding:4px"></div>
                    <div class="input-group"><label>📝 رسالة الترحيب</label><textarea id="setWelcome">${s.welcomeMsg || ''}</textarea></div>
                    <div class="input-group"><label>🔧 رسالة الإيقاف</label><textarea id="setStopMsg">${s.stopMsg || '🔧 البوت في وضع الصيانة'}</textarea></div>
                    <div class="input-group"><label>📞 يوزر الدعم</label><input type="text" id="setSupport" value="${s.supportUser || ''}" placeholder="TopVexSupport"></div>
                    <div class="input-group"><label>📊 نسبة الربح (%)</label><input type="number" id="setProfit" value="${s.profitRate || 10}" step="0.1"></div>
                    <div class="input-group"><label>🟢 حالة البوت</label><select id="setStatus"><option value="on" ${s.botStatus !== 'off' ? 'selected' : ''}>🟢 شغال</option><option value="off" ${s.botStatus === 'off' ? 'selected' : ''}>🔴 متوقف</option></select></div>
                    <button class="btn btn-success" onclick="saveGeneralSettings()">💾 حفظ الإعدادات</button>
                </div>
            `;
        }

        function saveGeneralSettings() {
            const settings = {
                storeName: document.getElementById('setStoreName').value,
                logo: document.getElementById('setLogo').value,
                primaryColor: document.getElementById('setColor').value,
                bgImage: document.getElementById('setBgImage').value,
                bgColor: document.getElementById('setBgColor').value,
                welcomeMsg: document.getElementById('setWelcome').value,
                stopMsg: document.getElementById('setStopMsg').value,
                supportUser: document.getElementById('setSupport').value,
                profitRate: parseFloat(document.getElementById('setProfit').value),
                botStatus: document.getElementById('setStatus').value
            };
            localStorage.setItem('settings', JSON.stringify(settings));
            showToast('✅ تم الحفظ', 'success');
        }

        // ==========================================
        // ٢. السلايدرات والترحيب
        // ==========================================
        function renderSliderSettings() {
            const images = JSON.parse(localStorage.getItem('sliderImages') || '[]');
            const msgs = JSON.parse(localStorage.getItem('welcomeMessages') || '[]');
            let html = `<div class="card"><h4>🖼 صور السلايدر</h4>`;
            images.forEach((img, i) => html += `<div class="list-item"><span>🖼 صورة ${i+1}</span><button class="btn btn-danger btn-sm" onclick="removeSliderImage(${i})">🗑</button></div>`);
            html += `<div class="input-group"><label>رابط الصورة (imgbb)</label><input type="text" id="newSliderImg" placeholder="https://i.ibb.co/..."></div>
                <button class="btn btn-primary" onclick="addSliderImage()">➕ إضافة صورة</button></div>`;

            html += `<div class="card"><h4>📝 رسائل الترحيب</h4>`;
            msgs.forEach((m, i) => html += `<div class="list-item"><span>${m.substring(0,40)}</span><button class="btn btn-danger btn-sm" onclick="removeWelcomeMsg(${i})">🗑</button></div>`);
            html += `<div class="input-group"><label>رسالة جديدة</label><input type="text" id="newWelcomeMsg" placeholder="أدخل رسالة ترحيبية"></div>
                <button class="btn btn-primary" onclick="addWelcomeMsg()">➕ إضافة رسالة</button></div>`;
            return html;
        }

        function addSliderImage() {
            const url = document.getElementById('newSliderImg').value.trim();
            if (!url) { showToast('❌ أدخل رابط الصورة', 'error'); return; }
            const images = JSON.parse(localStorage.getItem('sliderImages') || '[]');
            images.push({ image: url });
            localStorage.setItem('sliderImages', JSON.stringify(images));
            showToast('✅ تمت الإضافة', 'success');
            loadPage('sliderSettings');
        }
        function removeSliderImage(i) {
            const images = JSON.parse(localStorage.getItem('sliderImages') || '[]');
            images.splice(i, 1);
            localStorage.setItem('sliderImages', JSON.stringify(images));
            showToast('🗑 تم الحذف', 'success');
            loadPage('sliderSettings');
        }
        function addWelcomeMsg() {
            const msg = document.getElementById('newWelcomeMsg').value.trim();
            if (!msg) return;
            const msgs = JSON.parse(localStorage.getItem('welcomeMessages') || '[]');
            msgs.push(msg);
            localStorage.setItem('welcomeMessages', JSON.stringify(msgs));
            showToast('✅ تمت الإضافة', 'success');
            loadPage('sliderSettings');
        }
        function removeWelcomeMsg(i) {
            const msgs = JSON.parse(localStorage.getItem('welcomeMessages') || '[]');
            msgs.splice(i, 1);
            localStorage.setItem('welcomeMessages', JSON.stringify(msgs));
            showToast('🗑 تم الحذف', 'success');
            loadPage('sliderSettings');
        }

        // ==========================================
        // ٣. الأقسام
        // ==========================================
        function renderCategoriesPage() {
            const cats = JSON.parse(localStorage.getItem('categories') || '[]');
            let html = `<button class="btn btn-primary" onclick="addCategory()">➕ إضافة قسم رئيسي</button>`;
            html += `<div style="margin-top:12px">${cats.map(c => `
                <div class="list-item">
                    <span>${c.parent_id ? '↳' : '📁'} ${c.name} <small style="color:var(--text-secondary)">ID:${c.id} ${c.parent_id ? '(فرعي)' : '(رئيسي)'}</small></span>
                    <div>
                        <button class="btn btn-primary btn-sm" onclick="addSubCategory(${c.id})">➕ فرعي</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteCategory(${c.id})">🗑</button>
                    </div>
                </div>
            `).join('')}</div>`;
            return html;
        }

        function addCategory() {
            const name = prompt('اسم القسم الرئيسي:');
            if (!name) return;
            const cats = JSON.parse(localStorage.getItem('categories') || '[]');
            const newId = cats.length > 0 ? Math.max(...cats.map(c => c.id)) + 1 : 1;
            cats.push({ id: newId, name, parent_id: null, image: '' });
            localStorage.setItem('categories', JSON.stringify(cats));
            showToast('✅ تمت الإضافة', 'success');
            loadPage('categoriesPage');
        }
        function addSubCategory(parentId) {
            const name = prompt('اسم القسم الفرعي:');
            if (!name) return;
            const cats = JSON.parse(localStorage.getItem('categories') || '[]');
            const newId = cats.length > 0 ? Math.max(...cats.map(c => c.id)) + 1 : 1;
            cats.push({ id: newId, name, parent_id: parentId, image: '' });
            localStorage.setItem('categories', JSON.stringify(cats));
            showToast('✅ تمت الإضافة', 'success');
            loadPage('categoriesPage');
        }
        function deleteCategory(id) {
            if (!confirm('متأكد من حذف القسم؟')) return;
            let cats = JSON.parse(localStorage.getItem('categories') || '[]');
            cats = cats.filter(c => c.id !== id && c.parent_id !== id);
            localStorage.setItem('categories', JSON.stringify(cats));
            showToast('🗑 تم الحذف', 'success');
            loadPage('categoriesPage');
        }

        // ==========================================
        // ٤. السلع
        // ==========================================
        function renderItemsPage() {
            const items = JSON.parse(localStorage.getItem('items') || '[]');
            const cats = JSON.parse(localStorage.getItem('categories') || '[]');
            let html = `<button class="btn btn-primary" onclick="addItem()">➕ إضافة سلعة</button>`;
            html += `<div style="margin-top:12px">${items.map(i => {
                const cat = cats.find(c => c.id === i.category_id);
                return `<div class="list-item">
                    <span>📦 ${i.name} <small style="color:var(--text-secondary)">${i.type === 'auto' ? '🤖' : '✋'} ${cat ? cat.name : ''} | ${i.price || 0}$</small></span>
                    <button class="btn btn-danger btn-sm" onclick="deleteItem(${i.id})">🗑</button>
                </div>`;
            }).join('')}</div>`;
            return html;
        }

        function addItem() {
            const cats = JSON.parse(localStorage.getItem('categories') || '[]');
            if (cats.length === 0) { showToast('❌ أضف قسماً أولاً', 'error'); return; }
            const name = prompt('اسم السلعة:');
            if (!name) return;
            const price = parseFloat(prompt('السعر (دولار):') || '0');
            const type = confirm('هل هي تلقائية؟ (نعم=تلقائي، لا=يدوي)') ? 'auto' : 'manual';
            const inputLabel = prompt('اسم حقل الإدخال (مثلاً: رقم الهاتف، ايدي اللاعب):') || 'رقم الهاتف';
            let catId = null;
            const catsWithItems = cats.filter(c => {
                const items = JSON.parse(localStorage.getItem('items') || '[]');
                return items.some(i => i.category_id === c.id) || !c.parent_id;
            });
            const catList = cats.map((c, i) => `${i+1}- ${c.name} ${c.parent_id ? '(فرعي)' : '(رئيسي)'}`).join('\n');
            const catChoice = prompt(`اختر رقم القسم:\n${catList}`);
            if (catChoice && cats[parseInt(catChoice)-1]) {
                catId = cats[parseInt(catChoice)-1].id;
            }
            if (!catId) { showToast('❌ قسم غير صحيح', 'error'); return; }
            
            const items = JSON.parse(localStorage.getItem('items') || '[]');
            const newId = items.length > 0 ? Math.max(...items.map(i => i.id)) + 1 : 1;
            items.push({ id: newId, name, price, type, input_label: inputLabel, category_id: catId, source_id: null, api_item_id: type === 'manual' ? 'manual_' + Date.now() : '' });
            localStorage.setItem('items', JSON.stringify(items));
            showToast('✅ تمت الإضافة', 'success');
            loadPage('itemsPage');
        }
        function deleteItem(id) {
            if (!confirm('متأكد من حذف السلعة؟')) return;
            let items = JSON.parse(localStorage.getItem('items') || '[]');
            items = items.filter(i => i.id !== id);
            localStorage.setItem('items', JSON.stringify(items));
            showToast('🗑 تم الحذف', 'success');
            loadPage('itemsPage');
        }

        // ==========================================
        // ٥. المستخدمين
        // ==========================================
        function renderUsersPage() {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            let html = `<div class="input-group"><label>🆔 إضافة أدمن</label><input type="number" id="newAdminId" placeholder="أدخل ايدي المستخدم"></div>
                <button class="btn btn-success" onclick="addAdmin()">👑 إضافة أدمن</button>`;
            html += `<div style="margin-top:12px">${users.map(u => `
                <div class="list-item">
                    <span>👤 ${u.id} | 💰 ${u.balance || 0}$ | ${u.is_blocked ? '🚫' : '✅'}</span>
                    <div>
                        <button class="btn btn-warning btn-sm" onclick="addBalance(${u.id})">💰</button>
                        <button class="btn ${u.is_blocked ? 'btn-success' : 'btn-danger'} btn-sm" onclick="toggleBlock(${u.id})">${u.is_blocked ? '🔓' : '🚫'}</button>
                    </div>
                </div>
            `).join('')}</div>`;
            return html;
        }
        function addAdmin() {
            const id = parseInt(document.getElementById('newAdminId').value);
            if (!id) return;
            const admins = JSON.parse(localStorage.getItem('admins') || '[]');
            if (!admins.includes(id)) { admins.push(id); localStorage.setItem('admins', JSON.stringify(admins)); }
            showToast('✅ تمت الإضافة', 'success');
            loadPage('usersPage');
        }
        function addBalance(uid) {
            const amt = parseFloat(prompt('المبلغ (دولار):'));
            if (!amt || amt <= 0) return;
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            let u = users.find(u => u.id === uid);
            if (!u) { u = { id: uid, balance: 0, is_blocked: false, vip_level: 0 }; users.push(u); }
            u.balance = (u.balance || 0) + amt;
            localStorage.setItem('users', JSON.stringify(users));
            showToast('✅ تم', 'success');
            loadPage('usersPage');
        }
        function toggleBlock(uid) {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            let u = users.find(u => u.id === uid);
            if (!u) { u = { id: uid, balance: 0, is_blocked: false, vip_level: 0 }; users.push(u); }
            u.is_blocked = !u.is_blocked;
            localStorage.setItem('users', JSON.stringify(users));
            showToast('✅ تم', 'success');
            loadPage('usersPage');
        }

        // ==========================================
        // ٦. المصادر
        // ==========================================
        function renderSourcesPage() {
            const sources = JSON.parse(localStorage.getItem('sources') || '[]');
            let html = `<button class="btn btn-primary" onclick="addSource()">➕ إضافة مصدر</button>`;
            html += `<div style="margin-top:12px">${sources.map(s => `
                <div class="list-item">
                    <span>🔌 ${s.name} | ${s.api_url ? s.api_url.substring(0,30) : ''}...</span>
                    <div>
                        <button class="btn btn-primary btn-sm" onclick="testSource(${s.id})">🔍 اختبار</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteSource(${s.id})">🗑</button>
                    </div>
                </div>
            `).join('')}</div>`;
            return html;
        }
        function addSource() {
            const name = prompt('اسم المصدر:');
            if (!name) return;
            const url = prompt('رابط API:');
            const token = prompt('API Token:');
            const sources = JSON.parse(localStorage.getItem('sources') || '[]');
            const newId = sources.length > 0 ? Math.max(...sources.map(s => s.id)) + 1 : 1;
            sources.push({ id: newId, name, api_url: url, api_token: token, api_pattern: 'dev_hamza', status: 1 });
            localStorage.setItem('sources', JSON.stringify(sources));
            showToast('✅ تم', 'success');
            loadPage('sourcesPage');
        }
        function deleteSource(id) {
            if (!confirm('متأكد؟')) return;
            let sources = JSON.parse(localStorage.getItem('sources') || '[]');
            sources = sources.filter(s => s.id !== id);
            localStorage.setItem('sources', JSON.stringify(sources));
            showToast('🗑 تم', 'success');
            loadPage('sourcesPage');
        }
        async function testSource(id) {
            const sources = JSON.parse(localStorage.getItem('sources') || '[]');
            const source = sources.find(s => s.id === id);
            if (!source) return;
            showToast('⏳ جاري الاختبار...', 'success');
            if (window.MultiSourceAPI) {
                const result = await MultiSourceAPI.testConnection(source);
                showToast(result.success ? `✅ متصل | 💰 ${result.profile.balance}` : '❌ فشل', result.success ? 'success' : 'error');
            }
        }

        // ==========================================
        // ٧. الإذاعة
        // ==========================================
        function renderBroadcastPage() {
            return `<div class="card">
                <div class="input-group"><label>📢 نص الإذاعة</label><textarea id="broadcastMsg" placeholder="أدخل نص الإذاعة..."></textarea></div>
                <button class="btn btn-danger" onclick="sendBroadcast()">📢 إرسال للجميع</button>
            </div>`;
        }
        function sendBroadcast() {
            const msg = document.getElementById('broadcastMsg').value.trim();
            if (!msg) { showToast('❌ أدخل النص', 'error'); return; }
            if (!confirm('متأكد من إرسال الإذاعة لجميع المستخدمين؟')) return;
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            showToast(`📢 تم الإرسال لـ ${users.length} مستخدم`, 'success');
            loadPage('broadcastPage');
        }

        // ==========================================
        // ٨. روابط التواصل
        // ==========================================
        function renderSocialPage() {
            const links = JSON.parse(localStorage.getItem('socialLinks') || '[]');
            let html = links.map((l, i) => `<div class="list-item"><span>${l.icon} ${l.name}</span><button class="btn btn-danger btn-sm" onclick="removeSocial(${i})">🗑</button></div>`).join('');
            html += `<div class="input-row"><div class="input-group"><label>الاسم</label><input type="text" id="socName" placeholder="واتساب"></div><div class="input-group"><label>الأيقونة</label><input type="text" id="socIcon" placeholder="💬"></div></div>
                <div class="input-group"><label>الرابط</label><input type="text" id="socUrl" placeholder="https://..."></div>
                <button class="btn btn-primary" onclick="addSocial()">➕ إضافة</button>`;
            return html;
        }
        function addSocial() {
            const name = document.getElementById('socName').value.trim();
            const icon = document.getElementById('socIcon').value.trim();
            const url = document.getElementById('socUrl').value.trim();
            if (!name || !url) return;
            const links = JSON.parse(localStorage.getItem('socialLinks') || '[]');
            links.push({ name, icon: icon || '🔗', url });
            localStorage.setItem('socialLinks', JSON.stringify(links));
            showToast('✅ تم', 'success');
            loadPage('socialPage');
        }
        function removeSocial(i) {
            const links = JSON.parse(localStorage.getItem('socialLinks') || '[]');
            links.splice(i, 1);
            localStorage.setItem('socialLinks', JSON.stringify(links));
            showToast('🗑 تم', 'success');
            loadPage('socialPage');
        }

        // ==========================================
        // ٩. الغروبات
        // ==========================================
        function renderGroupsPage() {
            const groups = JSON.parse(localStorage.getItem('groups') || '{}');
            return `<div class="card">
                <div class="input-group"><label>💰 إيداعات</label><input type="text" id="grpDeposits" value="${groups.deposits || ''}" placeholder="ايدي الغروب"></div>
                <div class="input-group"><label>🤖 شحن تلقائي</label><input type="text" id="grpAuto" value="${groups.auto || ''}" placeholder="ايدي الغروب"></div>
                <div class="input-group"><label>✋ شحن يدوي</label><input type="text" id="grpManual" value="${groups.manual || ''}" placeholder="ايدي الغروب"></div>
                <div class="input-group"><label>🆕 مستخدمين جدد</label><input type="text" id="grpNewUsers" value="${groups.newUsers || ''}" placeholder="ايدي الغروب"></div>
                <button class="btn btn-success" onclick="saveGroups()">💾 حفظ</button>
            </div>`;
        }
        function saveGroups() {
            const groups = {
                deposits: document.getElementById('grpDeposits').value.trim(),
                auto: document.getElementById('grpAuto').value.trim(),
                manual: document.getElementById('grpManual').value.trim(),
                newUsers: document.getElementById('grpNewUsers').value.trim()
            };
            localStorage.setItem('groups', JSON.stringify(groups));
            showToast('✅ تم الحفظ', 'success');
        }

        // ==========================================
        // ١٠. طرق الدفع
        // ==========================================
        function renderPaymentPage() {
            const methods = JSON.parse(localStorage.getItem('paymentMethods') || '[]');
            let html = methods.map((m, i) => `<div class="list-item"><span>💳 ${m.name}</span><button class="btn btn-danger btn-sm" onclick="removePayment(${i})">🗑</button></div>`).join('');
            html += `<div class="input-group"><label>اسم الطريقة</label><input type="text" id="payName" placeholder="تحويل بنكي"></div>
                <div class="input-group"><label>رقم المحفظة</label><input type="text" id="payWallet"></div>
                <div class="input-group"><label>تعليمات</label><textarea id="payInstructions"></textarea></div>
                <div class="input-group"><label>سعر الصرف (1$ = ?)</label><input type="number" id="payRate" value="0"></div>
                <button class="btn btn-primary" onclick="addPayment()">➕ إضافة</button>`;
            return html;
        }
        function addPayment() {
            const methods = JSON.parse(localStorage.getItem('paymentMethods') || '[]');
            methods.push({
                name: document.getElementById('payName').value,
                wallet: document.getElementById('payWallet').value,
                instructions: document.getElementById('payInstructions').value,
                rate: parseFloat(document.getElementById('payRate').value) || 0
            });
            localStorage.setItem('paymentMethods', JSON.stringify(methods));
            showToast('✅ تم', 'success');
            loadPage('paymentPage');
        }
        function removePayment(i) {
            const methods = JSON.parse(localStorage.getItem('paymentMethods') || '[]');
            methods.splice(i, 1);
            localStorage.setItem('paymentMethods', JSON.stringify(methods));
            showToast('🗑 تم', 'success');
            loadPage('paymentPage');
        }

        // ==========================================
        // ١١. VIP
        // ==========================================
        function renderVipPage() {
            const levels = JSON.parse(localStorage.getItem('vipLevels') || '[{"level":1,"name":"VIP 1","discount":5,"required_orders":0},{"level":2,"name":"VIP 2","discount":10,"required_orders":10},{"level":3,"name":"VIP 3","discount":15,"required_orders":25},{"level":4,"name":"VIP 4","discount":20,"required_orders":50},{"level":5,"name":"VIP 5","discount":25,"required_orders":100}]');
            let html = levels.map((l, i) => `
                <div class="card">
                    <h4>👑 ${l.name}</h4>
                    <div class="input-row">
                        <div class="input-group"><label>الخصم %</label><input type="number" id="vipDiscount${i}" value="${l.discount}"></div>
                        <div class="input-group"><label>الطلبات المطلوبة</label><input type="number" id="vipOrders${i}" value="${l.required_orders}"></div>
                    </div>
                </div>
            `).join('');
            html += `<button class="btn btn-success" onclick="saveVip()">💾 حفظ</button>`;
            return html;
        }
        function saveVip() {
            const levels = JSON.parse(localStorage.getItem('vipLevels') || '[]');
            levels.forEach((l, i) => {
                l.discount = parseInt(document.getElementById(`vipDiscount${i}`).value) || 0;
                l.required_orders = parseInt(document.getElementById(`vipOrders${i}`).value) || 0;
            });
            localStorage.setItem('vipLevels', JSON.stringify(levels));
            showToast('✅ تم', 'success');
        }

        // ==========================================
        // ١٢. الاشتراك الإجباري
        // ==========================================
        function renderChannelsPage() {
            const channels = JSON.parse(localStorage.getItem('forcedChannels') || '[]');
            let html = channels.map((c, i) => `<div class="list-item"><span>📢 ${c.name}</span><button class="btn btn-danger btn-sm" onclick="removeChannel(${i})">🗑</button></div>`).join('');
            html += `<div class="input-row"><div class="input-group"><label>اسم القناة</label><input type="text" id="chName"></div><div class="input-group"><label>ايدي القناة</label><input type="text" id="chId" placeholder="@xxxx"></div></div>
                <div class="input-group"><label>الرابط</label><input type="text" id="chUrl" placeholder="https://t.me/..."></div>
                <button class="btn btn-primary" onclick="addChannel()">➕ إضافة</button>`;
            return html;
        }
        function addChannel() {
            const channels = JSON.parse(localStorage.getItem('forcedChannels') || '[]');
            channels.push({
                name: document.getElementById('chName').value,
                id: document.getElementById('chId').value,
                url: document.getElementById('chUrl').value,
                status: 1
            });
            localStorage.setItem('forcedChannels', JSON.stringify(channels));
            showToast('✅ تم', 'success');
            loadPage('channelsPage');
        }
        function removeChannel(i) {
            const channels = JSON.parse(localStorage.getItem('forcedChannels') || '[]');
            channels.splice(i, 1);
            localStorage.setItem('forcedChannels', JSON.stringify(channels));
            showToast('🗑 تم', 'success');
            loadPage('channelsPage');
        }

        // ==========================================
        // Toast
        // ==========================================
        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type + ' show';
            setTimeout(() => t.classList.remove('show'), 2500);
        }
    </script>
</body>
  </html>
