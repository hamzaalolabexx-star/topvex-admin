<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONE Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --primary:#6366f1;
            --primary-light:#818cf8;
            --bg:#0a0a0a;
            --bg-card:#1a1a2e;
            --bg-card-hover:#252540;
            --text:#ffffff;
            --text-secondary:#a1a1aa;
            --border:rgba(255,255,255,0.1);
            --gold:#f59e0b;
            --danger:#ef4444;
            --success:#10b981;
            --radius-lg:20px;
            --radius-md:14px;
            --radius-sm:10px;
            --shadow:0 4px 24px rgba(0,0,0,0.4);
            --transition:all 0.3s ease;
        }
        body.light-mode{
            --bg:#f8fafc;
            --bg-card:#ffffff;
            --bg-card-hover:#f1f5f9;
            --text:#0f172a;
            --text-secondary:#64748b;
            --border:rgba(0,0,0,0.08);
            --shadow:0 4px 24px rgba(0,0,0,0.06);
        }
        body{
            font-family:'Cairo',-apple-system,sans-serif;
            background:var(--bg);
            color:var(--text);
            min-height:100vh;
            overflow-x:hidden;
            transition:var(--transition);
            padding-bottom:100px;
        }
        body::before{
            content:'';
            position:fixed;top:-50%;left:-50%;
            width:200%;height:200%;
            background:radial-gradient(ellipse at 30% 20%,rgba(99,102,241,0.08) 0%,transparent 50%),
                       radial-gradient(ellipse at 70% 60%,rgba(245,158,11,0.05) 0%,transparent 50%);
            pointer-events:none;z-index:0;transition:var(--transition);
        }
        .app{position:relative;z-index:1;max-width:500px;margin:0 auto;padding:12px}

        /* الهيدر */
        .header{
            display:flex;align-items:center;justify-content:space-between;
            padding:12px 8px;margin-bottom:16px;
            position:sticky;top:0;z-index:100;
            background:rgba(10,10,10,0.85);backdrop-filter:blur(20px);
            border-radius:0 0 var(--radius-lg) var(--radius-lg);
        }
        body.light-mode .header{background:rgba(255,255,255,0.85)}
        .logo-area{display:flex;align-items:center;gap:10px}
        .logo-img{width:44px;height:44px;border-radius:var(--radius-sm);object-fit:cover;background:var(--bg-card)}
        .store-name{font-size:20px;font-weight:800;letter-spacing:-0.5px}
        .header-actions{display:flex;gap:6px}
        .icon-btn{
            width:40px;height:40px;border-radius:50%;
            border:none;background:var(--bg-card);
            color:var(--text);font-size:18px;
            cursor:pointer;display:flex;align-items:center;justify-content:center;
            transition:var(--transition);
        }
        .icon-btn:hover{background:var(--bg-card-hover);transform:scale(1.05)}
        .icon-btn.admin-btn{display:none}

        /* الشريط الجانبي */
        .sidebar{
            position:fixed;top:0;right:-320px;width:300px;height:100vh;
            background:var(--bg-card);z-index:200;
            transition:var(--transition);
            box-shadow:var(--shadow);
            padding:80px 20px 20px;
            overflow-y:auto;
        }
        .sidebar.open{right:0}
        .sidebar-overlay{
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:rgba(0,0,0,0.6);z-index:199;
            display:none;
        }
        .sidebar-overlay.show{display:block}
        .sidebar-close{
            position:absolute;top:16px;right:16px;
            width:40px;height:40px;border-radius:50%;
            border:none;background:var(--bg-card-hover);
            color:var(--text);font-size:22px;cursor:pointer;
        }
        .sidebar-item{
            display:flex;align-items:center;gap:12px;
            padding:14px 16px;border-radius:var(--radius-md);
            border:none;background:transparent;color:var(--text);
            font-family:inherit;font-size:15px;font-weight:600;
            cursor:pointer;transition:var(--transition);
            width:100%;text-align:right;
        }
        .sidebar-item:hover{background:var(--bg-card-hover)}
        .sidebar-item .icon{font-size:22px;width:32px;text-align:center}
        .sidebar-item.fav{color:var(--danger)}

        /* السلايدر */
        .slider-container{
            position:relative;overflow:hidden;
            border-radius:var(--radius-lg);
            margin-bottom:16px;height:160px;
            background:var(--bg-card);
        }
        .slider-track{
            display:flex;height:100%;
            transition:transform 0.5s ease;
        }
        .slider-slide{
            min-width:100%;height:100%;
            display:flex;align-items:center;justify-content:center;
            padding:20px;
        }
        .slider-slide img{
            width:100%;height:100%;
            object-fit:contain;border-radius:var(--radius-md);
        }
        .slider-dots{
            position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
            display:flex;gap:8px;
        }
        .slider-dot{
            width:8px;height:8px;border-radius:50%;
            background:rgba(255,255,255,0.3);border:none;cursor:pointer;
            transition:var(--transition);
        }
        .slider-dot.active{background:var(--primary);width:24px;border-radius:12px}

        /* رسائل الترحيب */
        .welcome-slider{
            background:linear-gradient(135deg,var(--primary),var(--primary-light));
            border-radius:var(--radius-lg);
            padding:16px 20px;margin-bottom:16px;
            min-height:50px;
            display:flex;align-items:center;
            font-weight:700;font-size:14px;
            position:relative;overflow:hidden;
        }
        .welcome-slider .msg{
            position:absolute;width:100%;padding:0 20px;
            transition:all 0.5s ease;
            opacity:0;transform:translateY(20px);
        }
        .welcome-slider .msg.active{opacity:1;transform:translateY(0)}

        /* الأقسام */
        .section-title{
            font-size:17px;font-weight:800;margin:20px 0 12px;
            display:flex;align-items:center;gap:8px;
        }
        .section-title::after{
            content:'';flex:1;height:2px;
            background:linear-gradient(to left,var(--primary),transparent);
            border-radius:2px;
        }
        .categories-grid{
            display:grid;grid-template-columns:repeat(2,1fr);gap:10px;
        }
        .cat-card{
            background:var(--bg-card);
            border-radius:var(--radius-md);
            padding:20px 12px;text-align:center;
            cursor:pointer;transition:var(--transition);
            border:1px solid var(--border);
            display:flex;flex-direction:column;align-items:center;gap:10px;
            min-height:110px;justify-content:center;
        }
        .cat-card:hover{
            background:var(--bg-card-hover);
            transform:translateY(-2px);
            box-shadow:var(--shadow);
            border-color:var(--primary);
        }
        .cat-card img{
            width:56px;height:56px;border-radius:var(--radius-sm);
            object-fit:cover;
        }
        .cat-card span{
            font-size:14px;font-weight:700;line-height:1.4;
        }

        /* صفحات */
        .page{display:none}
        .page.active{display:block}
        .back-btn{
            display:flex;align-items:center;gap:6px;
            padding:10px 16px;border:none;background:var(--bg-card);
            color:var(--text);border-radius:var(--radius-md);
            font-family:inherit;font-size:14px;font-weight:600;
            cursor:pointer;margin-bottom:12px;transition:var(--transition);
        }
        .back-btn:hover{background:var(--bg-card-hover)}

        /* كرت سلعة */
        .item-card{
            background:var(--bg-card);border-radius:var(--radius-md);
            padding:16px;margin-bottom:8px;
            display:flex;align-items:center;justify-content:space-between;
            border:1px solid var(--border);transition:var(--transition);
            cursor:pointer;
        }
        .item-card:hover{background:var(--bg-card-hover);border-color:var(--primary)}
        .item-info{flex:1}
        .item-name{font-weight:700;font-size:15px;margin-bottom:4px}
        .item-price{color:var(--primary);font-weight:800;font-size:14px}
        .item-type{font-size:11px;color:var(--text-secondary)}
        .fav-btn{
            width:36px;height:36px;border-radius:50%;
            border:none;background:transparent;font-size:20px;
            cursor:pointer;transition:var(--transition);
        }
        .fav-btn:hover{transform:scale(1.2)}
        .fav-btn.active{color:var(--danger)}

        /* فوتر */
        .footer{
            display:flex;justify-content:center;gap:16px;
            padding:20px;margin-top:24px;
        }
        .social-link{
            width:44px;height:44px;border-radius:50%;
            background:var(--primary);color:#fff;
            display:flex;align-items:center;justify-content:center;
            font-size:20px;text-decoration:none;
            transition:var(--transition);
        }
        .social-link:hover{transform:scale(1.1);box-shadow:0 4px 16px rgba(99,102,241,0.4)}

        /* مودال */
        .modal{
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:rgba(0,0,0,0.7);z-index:300;
            display:none;align-items:flex-end;justify-content:center;
        }
        .modal.show{display:flex}
        .modal-content{
            background:var(--bg-card);width:100%;max-width:500px;
            border-radius:var(--radius-lg) var(--radius-lg) 0 0;
            padding:24px 20px;max-height:85vh;overflow-y:auto;
        }
        .modal-header{
            display:flex;justify-content:space-between;align-items:center;
            margin-bottom:16px;
        }
        .modal-title{font-size:18px;font-weight:800}
        .modal-close{
            width:36px;height:36px;border-radius:50%;border:none;
            background:var(--bg-card-hover);color:var(--text);
            font-size:20px;cursor:pointer;
        }
        .input-group{margin-bottom:14px}
        .input-group label{display:block;font-size:13px;color:var(--text-secondary);margin-bottom:6px;font-weight:600}
        .input-group input{
            width:100%;padding:12px 14px;border-radius:var(--radius-sm);
            border:1px solid var(--border);background:var(--bg);
            color:var(--text);font-family:inherit;font-size:14px;
            transition:var(--transition);
        }
        .input-group input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
        .btn{
            width:100%;padding:14px;border-radius:var(--radius-sm);
            border:none;font-family:inherit;font-size:15px;font-weight:700;
            cursor:pointer;transition:var(--transition);
            display:flex;align-items:center;justify-content:center;gap:8px;
            margin-bottom:6px;
        }
        .btn-primary{background:var(--primary);color:#fff}
        .btn-primary:hover{background:var(--primary-light);box-shadow:0 4px 16px rgba(99,102,241,0.4)}
        .btn-danger{background:var(--danger);color:#fff}
        .btn-success{background:var(--success);color:#fff}
        .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}

        /* تبويبات */
        .tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bg);border-radius:var(--radius-sm);padding:4px}
        .tab{
            flex:1;padding:10px;text-align:center;border-radius:var(--radius-sm);
            border:none;background:transparent;color:var(--text-secondary);
            font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
            transition:var(--transition);
        }
        .tab.active{background:var(--primary);color:#fff}

        /* Toast */
        .toast{
            position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-120px);
            background:var(--bg-card);border:1px solid var(--border);
            border-radius:var(--radius-md);padding:12px 20px;
            font-weight:700;font-size:14px;z-index:999;
            transition:transform 0.4s ease;text-align:center;
            box-shadow:var(--shadow);
        }
        .toast.show{transform:translateX(-50%) translateY(0)}
        .toast.success{border-color:var(--success)}
        .toast.error{border-color:var(--danger)}

        /* أوصاف السلعة */
        .item-description{
            background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.3);
            border-radius:var(--radius-sm);padding:12px;margin:10px 0;
            font-size:14px;text-align:center;
        }
        .original-price{
            text-decoration:line-through;color:var(--text-secondary);
            font-size:14px;text-align:center;
        }
        .final-price{
            font-size:24px;font-weight:900;color:var(--primary);
            text-align:center;margin:8px 0;
        }
        .auto-badge{
            background:var(--success);color:#fff;
            padding:6px 14px;border-radius:20px;
            font-size:12px;text-align:center;margin:8px auto;
            display:inline-block;
        }
    </style>
</head>
<body>

    <div class="toast" id="toast"></div>
    <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- الشريط الجانبي -->
    <div class="sidebar" id="sidebar">
        <button class="sidebar-close" onclick="closeSidebar()">✕</button>
        <button class="sidebar-item" onclick="navigateTo('home')"><span class="icon">🏠</span> الرئيسية</button>
        <button class="sidebar-item fav" onclick="navigateTo('favorites')"><span class="icon">❤️</span> منتجاتي المفضلة</button>
        <button class="sidebar-item" onclick="navigateTo('deposit')"><span class="icon">💰</span> إضافة رصيد لحسابي</button>
        <button class="sidebar-item" onclick="navigateTo('payments')"><span class="icon">💳</span> دفعاتي المالية</button>
        <button class="sidebar-item" onclick="navigateTo('wallet')"><span class="icon">👛</span> محفظتي</button>
        <button class="sidebar-item" onclick="navigateTo('orders')"><span class="icon">📦</span> مشترياتي</button>
        <button class="sidebar-item" onclick="navigateTo('account')"><span class="icon">👤</span> حسابي</button>
        <button class="sidebar-item" onclick="navigateTo('about')"><span class="icon">ℹ️</span> من نحن</button>
        <hr style="border-color:var(--border);margin:8px 0">
        <button class="sidebar-item" onclick="toggleTheme()"><span class="icon" id="themeIcon">🌙</span> الوضع الداكن</button>
    </div>

    <!-- التطبيق -->
    <div class="app">
        <!-- الهيدر -->
        <div class="header">
            <div class="logo-area">
                <img class="logo-img" id="logoImg" src="images/logo.png" alt="Logo" onerror="this.style.display='none'">
                <span class="store-name" id="storeName">ONE Store</span>
            </div>
            <div class="header-actions">
                <button class="icon-btn admin-btn" id="adminBtn" title="لوحة الأدمن" onclick="openAdmin()">⚙️</button>
                <button class="icon-btn" onclick="openSidebar()">☰</button>
            </div>
        </div>

        <!-- الصفحة الرئيسية -->
        <div class="page active" id="page-home">
            <div class="slider-container" id="imageSlider">
                <div class="slider-track" id="sliderTrack"></div>
                <div class="slider-dots" id="sliderDots"></div>
            </div>
            <div class="welcome-slider" id="welcomeSlider">
                <div class="msg active">👋 أهلاً بك في ONE Store</div>
            </div>
            <div class="section-title">📂 تصفح الأقسام</div>
            <div class="categories-grid" id="categoriesGrid"></div>
            <div class="footer" id="socialFooter"></div>
        </div>

        <!-- الصفحات الفرعية -->
        <div class="page" id="page-subcategories"><div id="subContent"></div></div>
        <div class="page" id="page-favorites"><h3>❤️ المفضلة</h3><div id="favContent"></div></div>
        <div class="page" id="page-deposit"><h3>💰 إضافة رصيد</h3><div id="depositContent"></div></div>
        <div class="page" id="page-orders"><h3>📦 مشترياتي</h3><div id="ordersContent"></div></div>
        <div class="page" id="page-account"><h3>👤 حسابي</h3><div id="accountContent"></div></div>
        <div class="page" id="page-about"><h3>ℹ️ من نحن</h3><p style="padding:20px">ONE Store - متجركم الأول لشحن جميع الخدمات الإلكترونية في سوريا</p></div>
    </div>

    <!-- مودال الشراء -->
    <div class="modal" id="purchaseModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">شراء</span>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // ═══════════════ الإعدادات ═══════════════
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        const user = tg.initDataUnsafe?.user || {};
        const userId = user.id || 0;
        const admins = JSON.parse(localStorage.getItem('admins') || '[8257250965]');
        const isAdmin = admins.includes(userId);
        
        let currentSlide = 0;
        let welcomeIndex = 0;
        let slideInterval, welcomeInterval;
        let currentCategory = null;

        // مفتاح المفضلة الخاص بهذا المستخدم
        const favKey = `fav_${userId}`;

        // ═══════════════ دوال مساعدة ═══════════════
        function fixImageUrl(url) {
            if (!url) return '';
            url = String(url).trim();
            if (url.includes('ibb.co') && !url.includes('i.ibb.co')) {
                url = url.replace('https://ibb.co/', 'https://i.ibb.co/');
                if (!url.match(/\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i)) {
                    url += '.jpg';
                }
            }
            return url;
        }

        function getMyData(key) {
            try { return JSON.parse(localStorage.getItem(`${key}_${userId}`)); }
            catch { return null; }
        }

        function setMyData(key, value) {
            localStorage.setItem(`${key}_${userId}`, JSON.stringify(value));
        }

        function getSharedData(key) {
            try { return JSON.parse(localStorage.getItem(key)); }
            catch { return null; }
        }

        function setSharedData(key, value) {
            localStorage.setItem(key, JSON.stringify(value));
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type + ' show';
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => t.classList.remove('show'), 2500);
        }

        // ═══════════════ الثيم ═══════════════
        let currentTheme = localStorage.getItem('theme') || 'dark';
        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', currentTheme);
            applyTheme();
        }
        function applyTheme() {
            if (currentTheme === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('themeIcon').textContent = '☀️';
            } else {
                document.body.classList.remove('light-mode');
                document.getElementById('themeIcon').textContent = '🌙';
            }
        }

        // ═══════════════ التهيئة ═══════════════
        function init() {
            applyTheme();
            
            const settings = getSharedData('settings') || {};
            if (settings.storeName) document.getElementById('storeName').textContent = settings.storeName;
            if (settings.logo) {
                const logo = document.getElementById('logoImg');
                logo.src = fixImageUrl(settings.logo);
                logo.style.display = 'block';
            }
            if (settings.primaryColor) {
                document.documentElement.style.setProperty('--primary', settings.primaryColor);
                document.documentElement.style.setProperty('--primary-light', settings.primaryColor + 'cc');
            }
            if (isAdmin) document.getElementById('adminBtn').style.display = 'flex';
            
            loadSlider();
            loadWelcomeMessages();
            loadCategories();
            loadSocialLinks();
            startAllSliders();
        }

        // ═══════════════ السلايدر ═══════════════
        function loadSlider() {
            const slides = getSharedData('sliderImages') || [];
            if (slides.length === 0) {
                slides.push({ image: '' });
            }
            
            const track = document.getElementById('sliderTrack');
            const dots = document.getElementById('sliderDots');
            
            track.innerHTML = slides.map(s => `
                <div class="slider-slide">
                    <img src="${fixImageUrl(s.image)}" alt="Slide" onerror="this.parentElement.innerHTML='<div style=text-align:center;font-size:48px>🛍️</div>'">
                </div>
            `).join('');
            
            dots.innerHTML = slides.map((_, i) => `
                <button class="slider-dot ${i === 0 ? 'active' : ''}" onclick="goToSlide(${i})"></button>
            `).join('');
        }

        function goToSlide(i) {
            currentSlide = i;
            document.getElementById('sliderTrack').style.transform = `translateX(-${i * 100}%)`;
            document.querySelectorAll('.slider-dot').forEach((d, j) => d.classList.toggle('active', j === i));
            resetSlideInterval();
        }

        function resetSlideInterval() {
            clearInterval(slideInterval);
            const slides = getSharedData('sliderImages') || [];
            if (slides.length > 1) {
                slideInterval = setInterval(() => {
                    currentSlide = (currentSlide + 1) % slides.length;
                    document.getElementById('sliderTrack').style.transform = `translateX(-${currentSlide * 100}%)`;
                    document.querySelectorAll('.slider-dot').forEach((d, j) => d.classList.toggle('active', j === currentSlide));
                }, 3000);
            }
        }

        function loadWelcomeMessages() {
            const msgs = getSharedData('welcomeMessages') || ['👋 أهلاً بك في ONE Store'];
            const container = document.getElementById('welcomeSlider');
            container.innerHTML = msgs.map((m, i) => `<div class="msg ${i === 0 ? 'active' : ''}">${m}</div>`).join('');
        }

        function startAllSliders() {
            resetSlideInterval();
            
            const msgs = getSharedData('welcomeMessages') || [];
            if (msgs.length > 1) {
                clearInterval(welcomeInterval);
                welcomeInterval = setInterval(() => {
                    const all = document.querySelectorAll('#welcomeSlider .msg');
                    if (all.length === 0) return;
                    all.forEach(m => m.classList.remove('active'));
                    welcomeIndex = (welcomeIndex + 1) % all.length;
                    all[welcomeIndex].classList.add('active');
                }, 4000);
            }
        }

        // ═══════════════ الأقسام ═══════════════
        function loadCategories() {
            const categories = getSharedData('categories') || [];
            const grid = document.getElementById('categoriesGrid');
            const mainCats = categories.filter(c => !c.parent_id);
            
            grid.innerHTML = mainCats.map(cat => `
                <div class="cat-card" onclick="openCategory(${cat.id})">
                    <img src="${fixImageUrl(cat.image || '')}" alt="${cat.name}" onerror="this.innerHTML='<span style=font-size:32px>📁</span>'">
                    <span>${cat.name}</span>
                </div>
            `).join('');
        }

        function openCategory(catId) {
            currentCategory = catId;
            const categories = getSharedData('categories') || [];
            const items = getSharedData('items') || [];
            const cat = categories.find(c => c.id === catId);
            const subCats = categories.filter(c => c.parent_id === catId);
            const catItems = (items || []).filter(i => i.category_id === catId);

            let html = `<button class="back-btn" onclick="goBack()">⬅️ رجوع</button>`;
            html += `<h3>${cat ? cat.name : 'قسم'}</h3>`;
            
            if (subCats.length > 0) {
                html += `<div class="categories-grid" style="margin-top:12px">${subCats.map(sc => `
                    <div class="cat-card" onclick="openCategory(${sc.id})">
                        <img src="${fixImageUrl(sc.image || '')}" alt="${sc.name}" onerror="this.innerHTML='<span style=font-size:32px>📁</span>'">
                        <span>${sc.name}</span>
                    </div>
                `).join('')}</div>`;
                if (catItems.length === 0) {
                    document.getElementById('subContent').innerHTML = html;
                    navigateTo('subcategories');
                    return;
                }
            }

            if (catItems.length > 0) {
                html += `<div class="section-title">🛒 السلع</div>`;
                const favs = getMyData(favKey) || [];
                html += catItems.map(i => {
                    const isFav = favs.includes(i.id);
                    return `
                    <div class="item-card" onclick="openPurchase(${i.id})">
                        <div class="item-info">
                            <div class="item-name">${i.name}</div>
                            <div class="item-price">${(i.price || 0).toFixed(2)} $</div>
                            <div class="item-type">${i.type === 'auto' ? '🤖 تلقائي' : '✋ يدوي'}</div>
                        </div>
                        <button class="fav-btn ${isFav ? 'active' : ''}" onclick="event.stopPropagation();toggleFav(${i.id}, this)">❤️</button>
                    </div>`;
                }).join('');
            }

            document.getElementById('subContent').innerHTML = html;
            navigateTo('subcategories');
        }

        function goBack() {
            navigateTo('home');
            currentCategory = null;
            loadCategories();
        }

        // ═══════════════ المفضلة ═══════════════
        function toggleFav(itemId, btn) {
            let favs = getMyData(favKey) || [];
            if (favs.includes(itemId)) {
                favs = favs.filter(f => f !== itemId);
                if (btn) btn.classList.remove('active');
            } else {
                favs.push(itemId);
                if (btn) btn.classList.add('active');
            }
            setMyData(favKey, favs);
        }

        function loadFavorites() {
            const favs = getMyData(favKey) || [];
            const items = getSharedData('items') || [];
            const favItems = items.filter(i => favs.includes(i.id));
            const content = document.getElementById('favContent');
            
            if (favItems.length === 0) {
                content.innerHTML = '<p style="color:var(--text-secondary);text-align:center;margin:40px 0">لا توجد منتجات مفضلة</p>';
            } else {
                content.innerHTML = favItems.map(i => `
                    <div class="item-card" onclick="openPurchase(${i.id})">
                        <div class="item-info">
                            <div class="item-name">${i.name}</div>
                            <div class="item-price">${(i.price || 0).toFixed(2)} $</div>
                            <div class="item-type">${i.type === 'auto' ? '🤖 تلقائي' : '✋ يدوي'}</div>
                        </div>
                        <button class="fav-btn active" onclick="event.stopPropagation();toggleFav(${i.id}, this)">❤️</button>
                    </div>
                `).join('');
            }
        }

        // ═══════════════ الشراء ═══════════════
        function openPurchase(itemId) {
            const items = getSharedData('items') || [];
            const item = items.find(i => i.id === itemId);
            if (!item) return;

            document.getElementById('modalTitle').textContent = item.name;
            
            const description = item.description || '';
            const originalPrice = item.original_price || 0;
            const finalPrice = item.price || 0;
            
            document.getElementById('modalBody').innerHTML = `
                ${description ? `<div class="item-description">${description}</div>` : ''}
                
                ${originalPrice > finalPrice ? `
                    <div class="original-price">${originalPrice.toFixed(2)} $</div>
                ` : ''}
                <div class="final-price">${finalPrice.toFixed(2)} $</div>
                
                <div class="input-group">
                    <label>${item.input_label || 'معرف العملية'}</label>
                    <input type="text" id="purchasePlayerId" placeholder="${item.input_label || 'أدخل المعرف'}">
                </div>
                
                <div class="input-group">
                    <label>الكمية</label>
                    <input type="number" id="purchaseQty" value="1" min="1" onchange="updateTotal(${finalPrice})">
                </div>
                
                <p style="font-weight:800;font-size:18px;margin:12px 0;text-align:center">
                    الإجمالي: <span id="totalPrice">${finalPrice.toFixed(2)}</span> $
                </p>
                
                ${item.type === 'auto' ? '<div class="auto-badge">🤖 هذا المنتج يعمل بشكل أوتوماتيكي 24 ساعة</div>' : '<div style="text-align:center;color:var(--warning);margin:8px 0">✋ هذا المنتج يدوي - يحتاج مراجعة</div>'}
                
                <button class="btn btn-primary" onclick="confirmPurchase(${item.id})">✅ شراء</button>
                <button class="btn btn-outline" onclick="closeModal()">❌ إلغاء</button>
                
                ${item.extra_description ? `<p style="text-align:center;color:var(--text-secondary);margin-top:12px;font-size:13px">${item.extra_description}</p>` : ''}
            `;
            
            document.getElementById('purchaseModal').classList.add('show');
        }

        function updateTotal(price) {
            const qty = parseInt(document.getElementById('purchaseQty').value) || 1;
            document.getElementById('totalPrice').textContent = (price * qty).toFixed(2);
        }

        function confirmPurchase(itemId) {
            const items = getSharedData('items') || [];
            const item = items.find(i => i.id === itemId);
            if (!item) return;

            const qty = parseInt(document.getElementById('purchaseQty').value) || 1;
            const playerId = document.getElementById('purchasePlayerId').value.trim();
            const inputLabel = item.input_label || 'معرف العملية';

            if (!playerId) {
                showToast(`⚠️ أدخل ${inputLabel}`, 'error');
                return;
            }

            const totalPrice = (item.price || 0) * qty;

            // إرسال للبوت
            try {
                tg.sendData(JSON.stringify({
                    action: 'purchase',
                    data: JSON.stringify({
                        item_id: itemId,
                        item_name: item.name,
                        price: item.price || 0,
                        quantity: qty,
                        player_id: playerId,
                        is_manual: item.type !== 'auto',
                        api_item_id: item.api_item_id || '',
                        source_id: item.source_id || null
                    })
                }));
                showToast('✅ جاري معالجة الطلب...', 'success');
            } catch(e) {
                showToast('❌ فشل الاتصال بالبوت', 'error');
            }
            closeModal();
        }

        function closeModal() {
            document.getElementById('purchaseModal').classList.remove('show');
        }

        // ═══════════════ الإيداع ═══════════════
        function loadDeposit() {
            const methods = getSharedData('paymentMethods') || [];
            const content = document.getElementById('depositContent');
            
            if (methods.length === 0) {
                content.innerHTML = '<p style="text-align:center;margin:40px 0;color:var(--text-secondary)">لا توجد طرق دفع متاحة</p>';
                return;
            }
            
            content.innerHTML = methods.map(m => `
                <div class="item-card" onclick="openDepositMethod(${m.id})">
                    <div style="display:flex;align-items:center;gap:12px">
                        ${m.image ? `<img src="${fixImageUrl(m.image)}" style="width:44px;height:44px;border-radius:10px;object-fit:cover" onerror="this.style.display='none'">` : ''}
                        <div class="item-info">
                            <div class="item-name">${m.name || 'طريقة دفع'}</div>
                            <div style="font-size:12px;color:var(--text-secondary)">تقديم دفعة</div>
                        </div>
                    </div>
                    <span>→</span>
                </div>
            `).join('');
        }

        function openDepositMethod(methodId) {
            const methods = getSharedData('paymentMethods') || [];
            const m = methods.find(x => x.id === methodId);
            if (!m) return;
            
            document.getElementById('modalTitle').textContent = m.name || 'تقديم دفعة';
            
            let html = '';
            if (m.image) {
                html += `<div style="text-align:center;margin-bottom:16px"><img src="${fixImageUrl(m.image)}" style="max-width:120px;max-height:120px;border-radius:var(--radius-md)" onerror="this.style.display='none'"></div>`;
            }
            if (m.wallet) {
                html += `<div style="background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.4);border-radius:var(--radius-sm);padding:12px;text-align:center;margin:10px 0;word-break:break-all;font-weight:700">${m.wallet}</div>`;
            }
            if (m.instructions) {
                html += `<div style="background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.3);border-radius:var(--radius-sm);padding:12px;margin:10px 0;font-size:13px;white-space:pre-line">${m.instructions}</div>`;
            }
            if (m.min_amount || m.max_amount) {
                html += `<div style="color:var(--danger);font-size:13px;text-align:center;margin:8px 0">`;
                if (m.min_amount) html += `أقل مبلغ: ${m.min_amount}$ `;
                if (m.max_amount) html += `أعلى مبلغ: ${m.max_amount}$`;
                html += `</div>`;
            }
            
            html += `
                <div class="input-group"><label>معرف المعاملة</label><input type="text" id="depRef" placeholder="أدخل معرف العملية"></div>
                <div class="input-group"><label>القيمة $</label><input type="number" id="depAmount" placeholder="المبلغ" step="0.01" oninput="calcDepositValue()">
                <div style="text-align:center;margin:6px 0;color:var(--text-secondary);font-size:13px">القيمة التي سيتم إرسالها: <span id="depCalcValue">0</span></div></div>
                <button class="btn btn-primary" onclick="submitDeposit(${methodId})">طلب</button>
                <button class="btn btn-outline" onclick="closeModal()">إلغاء</button>
            `;
            
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('purchaseModal').classList.add('show');
        }

        function calcDepositValue() {
            const amt = parseFloat(document.getElementById('depAmount').value) || 0;
            document.getElementById('depCalcValue').textContent = amt.toFixed(0);
        }

        function submitDeposit(methodId) {
            const methods = getSharedData('paymentMethods') || [];
            const m = methods.find(x => x.id === methodId);
            const ref = document.getElementById('depRef').value.trim();
            const amount = parseFloat(document.getElementById('depAmount').value) || 0;
            
            if (!ref || amount <= 0) {
                showToast('⚠️ أكمل جميع الحقول', 'error');
                return;
            }
            
            try {
                tg.sendData(JSON.stringify({
                    action: 'deposit',
                    data: JSON.stringify({
                        method_id: methodId,
                        method: m ? m.name : 'غير محدد',
                        amount: amount,
                        ref: ref,
                        screenshot: ''
                    })
                }));
                showToast('✅ تم تقديم طلب الإيداع', 'success');
            } catch(e) {
                showToast('❌ فشل', 'error');
            }
            closeModal();
        }

        // ═══════════════ الطلبات ═══════════════
        function loadOrders(filter = 'all') {
            const orders = getMyData('orders') || [];
            const content = document.getElementById('ordersContent');
            
            if (orders.length === 0) {
                content.innerHTML = '<p style="text-align:center;margin:40px 0;color:var(--text-secondary)">لا توجد طلبات</p>';
                return;
            }
            
            const statusMap = { completed: '✅ مقبول', pending: '⏳ قيد الانتظار', processing: '🔄 جاري', rejected: '❌ مرفوض' };
            const filtered = filter === 'all' ? orders : orders.filter(o => o.status === filter);
            const autoCount = orders.filter(o => o.type !== 'manual').length;
            const manualCount = orders.filter(o => o.type === 'manual').length;
            
            content.innerHTML = `
                <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;color:var(--text-secondary)">
                    <span>🤖 ${autoCount} API</span>
                    <span>✋ ${manualCount} يدوي</span>
                </div>
                <div class="tabs">
                    <button class="tab ${filter === 'all' ? 'active' : ''}" onclick="loadOrders('all')">الكل (${orders.length})</button>
                    <button class="tab ${filter === 'completed' ? 'active' : ''}" onclick="loadOrders('completed')">مقبول</button>
                    <button class="tab ${filter === 'pending' ? 'active' : ''}" onclick="loadOrders('pending')">قيد الانتظار</button>
                    <button class="tab ${filter === 'rejected' ? 'active' : ''}" onclick="loadOrders('rejected')">مرفوض</button>
                </div>
                <div>${filtered.map(o => `
                    <div class="item-card" onclick="showOrderDetail('${o.id}')">
                        <div class="item-info">
                            <div class="item-name">${o.item_name} ${o.quantity > 1 ? '(x' + o.quantity + ')' : ''}</div>
                            <div style="font-size:12px;color:var(--text-secondary)">${statusMap[o.status] || o.status} | ${o.price ? o.price.toFixed(2) : '0.00'} $ | ${new Date(o.date).toLocaleString('ar')}</div>
                            <div style="font-size:11px;color:var(--text-secondary)">${o.player_id}</div>
                        </div>
                        <span>→</span>
                    </div>
                `).join('')}</div>
            `;
        }

        function showOrderDetail(orderId) {
            const orders = getMyData('orders') || [];
            const o = orders.find(x => x.id === orderId);
            if (!o) return;
            
            const statusMap = { completed: '✅ مقبول', pending: '⏳ قيد الانتظار', rejected: '❌ مرفوض', processing: '🔄 جاري' };
            
            document.getElementById('modalTitle').textContent = 'تفاصيل الطلب';
            document.getElementById('modalBody').innerHTML = `
                <p><strong>الحالة:</strong> ${statusMap[o.status] || o.status}</p>
                <p><strong>رقم العملية:</strong> ${o.id}</p>
                <p><strong>السلعة:</strong> ${o.item_name}</p>
                <p><strong>الكمية:</strong> ${o.quantity || 1}</p>
                <p><strong>السعر:</strong> ${(o.price || 0).toFixed(2)} $</p>
                <p><strong>التاريخ:</strong> ${new Date(o.date).toLocaleString('ar')}</p>
                <p><strong>المعرف:</strong> ${o.player_id}</p>
                ${o.response ? `<p><strong>الرد:</strong> ${o.response}</p>` : ''}
                <button class="btn btn-outline" onclick="closeModal()">🔙 إغلاق</button>
            `;
            document.getElementById('purchaseModal').classList.add('show');
        }

        // ═══════════════ الحساب ═══════════════
        function loadAccount() {
            const myData = getMyData('profile') || { balance: 0 };
            document.getElementById('accountContent').innerHTML = `
                <div class="item-card"><div class="item-info"><div class="item-name">🆔 الايدي</div><div>${userId}</div></div></div>
                <div class="item-card"><div class="item-info"><div class="item-name">💰 الرصيد</div><div>${(myData.balance || 0).toFixed(2)} $</div></div></div>
            `;
        }

        // ═══════════════ روابط التواصل ═══════════════
        function loadSocialLinks() {
            const links = getSharedData('socialLinks') || [];
            const footer = document.getElementById('socialFooter');
            footer.innerHTML = links.map(l => `
                <a href="${l.url}" target="_blank" class="social-link" title="${l.name}">${l.icon || '🔗'}</a>
            `).join('');
        }

        // ═══════════════ التنقل ═══════════════
        function navigateTo(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById('page-' + page);
            if (target) target.classList.add('active');
            closeSidebar();
            window.scrollTo(0, 0);
            
            if (page === 'favorites') loadFavorites();
            if (page === 'orders') loadOrders();
            if (page === 'deposit') loadDeposit();
            if (page === 'account') loadAccount();
            if (page === 'home') { loadCategories(); loadSocialLinks(); startAllSliders(); }
        }

        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('overlay').classList.add('show');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
        }
        function openAdmin() {
            window.location.href = 'admin.html';
        }

        // ═══════════════ انطلاق ═══════════════
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
  </html>
